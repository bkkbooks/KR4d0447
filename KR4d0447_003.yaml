body:
  text: 金淵集卷三元仇逺撰五言律詩丁未元日花申喜循環風霜變老顔閒身留泮水歸夢滿湖山雪凍蝗應避春暄鴈欲還桃符随手寫禍福不相關窓外梅方開淡月江南樹香竒影亦竒春前十二月雪後兩三枝冷蘂疎堪數孤根穏不移西湖老仙宅清夢夜何其正月二十四日送亷使出郊閒騎羸馬出逺錢繡衣行愛此川原迥欣然風日晴隔籬梅半落斷隴麥初生毎恨微官缚茅山負夙盟野店當官道村醪喚客留偶因乗早出故作探春逰芳意林梢静晴光水面浮人言有龍洞近在石山頭聞楊大受凌吉叟吴次山諸友訃音有感二首落落霜餘樹踈踈曉後星經年才契濶故友半凋零有夢懐風采何人作墓銘老孤無限淚空望浙山青少長皆吾友相期满百齡生分青白眼死隔短長亭蕉本身為幻藤床夢是醒中山醇酒在且醉學劉伶孫康侯北歸淮海十年别北歸今幾時鏡中無舊髪嚢底有新詩毎恨為官縛翻令見面遲清都逰厯事還許俗人知夢得墨四片一差短戱呈廷玉昔賢鲁夢筆夢墨定何如應使山中隠重研世上書磨人驚老大飲汁笑空疎長短無庸較三螺已有餘陸雲得石墨數十斤送兄三螺四月十六夜月蝕盛服拜清夜中庭朝太隂凡来仰天者俱有愛君心目斷山河影耳聞鐘磬音還光俄頃易涕泗漫沾襟送田道士歸茅阜我愛孟東野君師田子方放舟㳺瀬水飛舄返華陽有酒須同酌真情不可忘仙源橋下徑何日共徜徉亷公子家藏元石名武夷春雨至寳忽横道峯巒髙復低數尖靈壁石一曲武夷溪黛色春浮玉黄流雨曵泥遥知千載下名與峴山齊醉聞杜宇家家酒似池日日醉如泥海燕聊為客杜䳌何苦啼狂那知㡌落歸不為花迷信筆成詩句苔牋小草題移牀詩莞簟輕輕卷藤牀故故移暑塵無避處客舍有涼時開帳迎風易鈎簾㸔雨宜緑隂更清絶舊竹長新枝長晝閒官少公出長日足髙眠律已惟三尺埋頭又兩年雖無乞米帖安得買山錢莫聽閒唇舌行藏任老天處暑後風雨疾風驅急雨殘暑掃除空因識炎涼態都来頃刻中紙窓嫌有隙紈扇笑無功兒讀秋聲賦令人憶醉翁閒歩邨逕桑麻合扶笻信所之緑隂晴冉冉白日歩遲遲野繭粘髙樹山雌入破籬豈無欵段馬常是小兒騎鼓角五更相次曉一曲有餘清忽醒山林夢遥聞鼓角聲背風還迤邐帶月最分眀莫作邊城㸔長淮乆息兵六月雨驟雨忽終日髙田知有秋斜風驅溽暑平地作交流屋漏忙移坐泥深懶出㳺美哉今夕睡涼意已浮浮鴈四郊皆積水鳴鴈一何多随處沙頭宿常時月下過弟兄求口食覉旅困風波寄語支更者蘆深有網羅新秋雙星方卜夜載宿已交秋未覺炎涼改先為草木憂鴈来催燕去火老讓金柔阮籍知何事江東尚滯留秋感眀朝交白露此夜起金風燈下倚孤枕籬根語百蟲梧桐何處落杼軸幾家空客意驚秋半炎涼信轉蓬蛩依莎底露螢堕樹頭風秋已来多日人誰念二蟲火流豳月應雪散楚天空摇落年年事吾生鬢亦蓬八月二十三日三溪書房賞桂二花二花香更烈不與一花同曽記和雲折惟愁着雨空舊逰眀月窟古意小山叢十日中秋過渾疑秋未中冷坐冷官宜静坐借屋近荒村無酒可延客未昏先閉門水眀知月上木落見梅尊滿目凄涼者相逢不必言抱膝抱膝坐終日澹然忘是非縱令官未满已與世相違古道平蕪合誰家新燕歸年荒烟火歇空老一山薇七月梨花紫薇紅槿外忽見此花嬌縱被秋陽暴何愁香雪消夢回雲冉冉春逺夜寥寥魂隔梧桐雨時吹玉笛招和卞仲祥我愛中秋月行歌荒野中亂雲催薄暮喬木易髙風鏡裏花難折樽中酒不空南飛有烏鵲未見北来鴻和黄晉卿金陵見寄臺城為客乆書札竟寥寥山水舟車近風霜歳月遥窮猿猶擇木威鳯合冲霄曽有論文約應須折簡招再和卞仲祥待月東扉外一枝眀燭殘誰将丹桂子種在碧雲端病葉依窓濕飢鴻集渚寒嬋姢為雨妬怊悵又更闌次西和韻貧是儒家事生平畏四知燈花空送喜瓶粟不供炊湖海心終在田園計未遲願同華山叟驢背倒能騎八月十四夜月下聞秋聲中秋纔一宿此夜已圎眀星斗何曽見雲煙不敢生黄花千萬粟白髪兩三莖愁聴東南角奔騰風雨聲樹葉不知何樹葉紅潤極鮮眀一片風吹落幾畨霜染成止啼誠誑語題字亦閒情把玩真堪惜擕歸予繡枰憶暢慶玉如四上人臘中晴色乆霜月冷森森可但思元度惟應憶道林三更難得曉一片欲歸心有約分苔石南山蒼樹隂曉霜重衾驚驟冷萬瓦見濃霜夾岸蒹葭白空庭橘柚黄宦情真淡泊歳晚轉荒涼野寺鐘聲早何人僕馬忙中元詩初秋當望夜平楚帶斜曛暑氣能昏月砧聲不隔雲華燈浮白水老衲誦㝠文土人放燈設㝠漫説中元節儒書惜未聞和子野四首旅食無生計卑棲奈若何飯惟供脱粟衣未補香莎户外履常滿床頭金不多老為文學掾一似舊恩科宋特奏名授縣文學窮冬霜霰集行路古今難舉眼㸔浮世何人耐歳寒棄瓢将止酒脱冕擬休官一室能容膝吾生亦易安亨塗即畏塗暮境欲何如索米多貧士鈔詩欠小胥自縁鄉夢熟頓與世情疎㑹約逃名者山間倒跨驢詭遇非吾事支離笑我身文章寕可拙仕宦豈宜貧鄉故多新鬼年荒少佚民休嗟華黍廢陽谷易回春再疊醉眠春一榻不記夢伊何落月眀紅葉寒㕔暗緑莎敝袍為客乆髙枕閱人多未有匡時策無心中甲科世態年年改窮居事事難予懐雖浩蕩此地本酸寒古瀬浮貞女空齋貯冷官枯腸與藜莧歳乆頗相安老景存三樂浮生付六如是非忘馬指憎愛任烏胥烏胥見説苑故里仍饑饉清流例濶疎有人風雪外詩在斷橋驢雪溪漁隠者郊島是前身乍見猶疑傲相逢不説貧鶴招窮處士梅伴老詩人時共論文酒衰顔少借春三疊禁酤限十日亡何能幾何流光徒荏苒老眼自挼莎江浙歸心切山林醒眼多富家憂勸率役後欲重科為貧干寸祿匏繫欲歸難鴈字誰能寄鷗盟乆已寒自憐秦博士何似衛伶官終覺家居樂髙眠一枕安在昔金淵地煙花錦不如衣冠尊史祖漢史崇山水識靈胥富歳人多頼前修日以疎洪厓仙可問願乞雪精驢飽喫芹宫飯飢寒未廹身公侯方重老妻子莫憂貧踪跡新豐客心期畫邑人皇荂歌一曲聊以和陽春黄渚舟中夕晴殊可喜小作川原逰水岸菰蔣合野田鴻鴈留雲煙易得晚城市那知秋落葉塞破屋逃亡令我愁酌彼溪店酒醉向舟中眠舟人待月出急急乗晚牽前山見瓦屋山名小彴横沙田橋名回首六百載我思唐謫仙棕荘幽徑秋隂合青渠草色深肯教木葉落直見夕陽沉獨客逢来鴈新寒集逺砧芙蓉花似錦有意媚髙林寄鄂渚王子文教授笑把青藜杖逺逰黄鶴城雨消戰伐氣春生絃誦聲相從未有約乆别難為情東望思渺渺江長秋月眀送楊剛中赴淮安教授西蜀楊君子才為博士優儒官清似水學舍小於舟吴地仍多潦淮田薄有收雖非溫飽計足解友朋憂風起朔風連夕起浩蕩厲嚴寒逺勢驚春夢微權属冷官雲行和月暗木落打窓乾因憶吴船客波濤寝不安廣教寺三門當驛道四壁啟僧房頗有千竿竹能令六月涼撞鐘山鸛起煮茗石罌香岸曲盤渦急人言古瀬陽次彦功韻春早風驅雪天寒竹映門燈前終夜讀笈内故書存尚覺文章貴那矜齒爵尊向平愁未了女嫁與兒昏雨止夜半雨忽止老夫心頓寛最憐兒女弱難受雪霜寒澤國無来棹臺城有去鞍西村歸未卜此日敢求安薄逰未草閒居賦聊從薄宦逰江湖明老眼風雨暗孤舟客况何曽好吾生本自浮終然愧農圃将有事西疇形影形影自相問追随六十年冷官真漫爾歸夢亦蘧然但覺寒風暖難令素髪元可能學陶令家去有園田曉出西城閒官閒不盡曉出古城隂斗柄已揷地秋聲将滿林故園三畆宅落月幾家砧為報柴桑令予今亦委心三更汎舟謝逹渰渰水不盈尺大舟行水中朦朧微有月㶑灔寂無風時序三秋半隂晴萬里同山歌與村笛醉卧聽漁童一望四十里瀰漫白浸天何年圍此水為我墾成田風使㠶船疾雲和竹葦連末流溪轉狭浮沫帶蛟涎代歩羸驂聊代歩按轡且徐行凹凸驚前路驅馳羡後生曉回天尚闇路滑雨初晴得似肩輿穏歸来醉不驚舎北野歩野歩上西門寛平又一邨疎籬圍古井宻樹擁髙墳家有田園樂氓知守令尊因思興廢事變滅似秋雲次蕭饒州韻愛山如愛士交友竟忘年未老先辭祿能閒始是仙清談真藥石雅志樂林泉笑㸔衡門外随風栁絮顛謙謙賢太守止止樂閒居健筆凌三謝髙風繼二疏家猶傳故笏夢不到安車何處溪山好相從結草廬再用韻寓舎已三遷閒官又一年酒杯時樂聖茶椀欲通仙愛笋從穿壁澆花自汲泉誰能問前代劉蹶與秦顛數椽西郭外元不異村居官冷謀升斗頭童怯比疏莫愁書費紙肯嘆出無車也勝焦徴士蝸牛卧雪廬同室同室過百指一官寖四年幸無乞米帖何取買山錢止酒陶元亮思歸孟浩然乾魚兼菜把頗勝酌貪泉朋酒朋酒朝朝樂鄉心夜夜愁朱雲難作吏宋玉易悲秋陵谷何曽改田園未可求南来幾鴻鴈亦為稻梁謀之金陵文學本閒官長年愧素餐出門還自笑行路有何難風日幽懐暢江山望眼寛六朝遺迹在随喜一逰歡方萬里史敬輿陳孝先龔聖予胡穆仲相繼淪沒令人感愴諸老俱塵土令予雙淚流幾年能再見一氣故應休江左衣冠盡人間翰墨留空山茅屋底野史屬誰修寄陳南翔張伯成主賓山水未逰徧其如歸夢何獨憐黄渚月相隔白漚波秋盡那無鴈霜遲尚有荷終期共燈火揷架異書多遣意衮衮歲年晚冥冥車馬塵饑烏方畏雪凍草已矜春鄉老知誰健儒官自古貧眀朝除夜近市井悄無人抖擻老精神飄蓬又一春敢言惟有我每恨不如人文字須稱韻功名莫認真青銅杖頭在留與買烏薪宦逰今倦矣歳晚意何如臘雪不到地春風先滿閭鄰翁寒乞炭溪女曉供魚多有梅花處吾将卜隱居利交一自儀秦去從衡直到今士縁貧失節交以利知心乍可昏求火何堪晝見金狂瀾回已倒猶幸有山林聞雞今夕知何夕此聲非惡聲窓前疑月色枕上誤天眀未必皆三唱惟應只四更姑蘇城外寺此際已鐘鳴題水軒水軒寒最早偏稱冷官居老態重衾薄秋聲四壁虚霜前蛩漸少雨後葉全疎漁叟頑如鐵鶉衣曉捕魚有感腐儒乖世用作事例迂疎浪走長安道欲投光範書懸知成漫爾可笑賦歸與寄語陳言者毋輕出草廬潦雨排悶二首淫雨喧中夜覊人積隱憂葵傾那有日麥腐欲無秋小市渾如洗前溪漫不流林鳩兼垤鶴聒聒幾時休宿雨漲溪流江南四月秋市無糧得糶田有麥難収官况全然冷民飢絶可憂沙鷗應笑我何日放歸舟跨馬跨馬入城去驅鷄上屋飛閒官差可樂徒歩未為非杜老平眀出山公倒載歸晚汀沙水濶野鶩得相依醉歌三首金淵醇酒賤足可醉亡何日覺醒時少其如飲不多人生間調笑俗事暗消磨此意神仙㑹山童亦解歌客居真易過凡事不如儀惟有閒尋睡渾無趣作詩晚晴行數歩日午酌三巵繋馬庭階下人多借去騎清狂歌窈窕微醉困瞢騰酒薄多疑水官閒一似僧已知燈即火不願谷為陵百事俱能了惟餘飲未能自愛金淵豈愛我我自愛金淵似蜜醪尤美如珠米更圎擕家踰八口竊禄又三年書册盈歸篋毋嫌載月船和友人韻山林空入夢詩酒未忘懐老興自不淺卿言亦大佳封侯無骨相學道有心齊安樂行窩在棲棲且避乖呈王達之御史西晉文章伯南臺法令師常因行部日記得從逰時敏手除三害貞心畏四知何由侍王導揮塵話襟期贈别葉子啟郭祥卿萍水偶相逢金淵客路中㠶船眀日發尊酒㡬時同窮逹無先後交逰貴始終湖堤梅栁外有約艤疎篷敝車汝自騎髙馬予寧坐敝車功名輸後茂天地著迂疎漫説癡人夢仍㸔後世書謫仙酒樓在不醉欲何如張氏隱居杜老曾題品依稀舊隠居頗知書有味肯教子為儒築屋先通燕開池剰養魚相邀須飲醉酒熟不煩沽過鄭氏幽居趁雨過雲闗東風尚峭寒野花渾未放石路卒難乾薄酒無多酌窮途信少歡歸来借蓑笠莫作老坡㸔懐方嚴州八十一年前科名已褎然依劉王粲檄入洛賀循船受禪碑誰上閒情賦自傳江山英氣歇堪恨亦堪憐八十一年終堪嗟旅櫬窮胸中元耿耿身外竟空空白首太元草紫陽虚谷翁平生有遺恨五馬未乗驄八十一年亡哀哉老紫陽佳兒方戒道小妾漫專房每憶先生被常懐太守章桐江詩萬首端可及龜堂八十一年身棲遲客館貧登門曾有我銘墓竟何人醉夢髙樓月悲歌故國春可能函玉骨歸𦵏練溪濱八十一年休云何不首邱豈無商女恨肯作賈胡留書籍從人賣田園有子收烏聊山在望風雪去悠悠懐張似之少日登山屐中年上水船黄花猶自緑白髪若為元但覺杯行速那知帽影偏南峯深秀處回首重澘然釣鰲亭俯瞰秦淮水前瞻魯泮宫眀知倚闌者不是釣魚翁古石稜稜長春潮脉脉通狀元真宰相千古一吴公除夜新居避喧遷出郭歳晚尚擔簦陋室大於斗長途滑似氷豈無問字酒共守讀書燈老病須微祿歸田恨未能籶盆夾道眀爆竹小兒驚但聽窓前雪不知樓上更流年雙羽急深夜一鷄鳴淺醉和衣睡眀朝要賀正茅簷盈尺雪真是冷官居窮巷稀人跡今朝是歳除聒㕔無鼓吹消夜足琴書曉凍氷橋滑鄰家借板輿
