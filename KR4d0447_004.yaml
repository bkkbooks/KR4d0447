body:
  text: 金淵集卷四元仇逺撰七言律詩元夕放夜繡衣玉節駐江城放得元宵兩夜晴陸地金蓮方灧灧一天明月故盈盈邏兵酣卧忘鐘韻逰子歡呼趁鼓聲兒女看燈歸較晚老夫自剔讀書檠憶西坡梅杖藜久不到西坡苔上梅花積漸多野屋荒涼誰管領酒尊期會竟蹉跎韶光二月已強半樂事一生能幾何賴有鄰園春可折洗瓶斜插在行窩三月二十六日書所聞從來賽社説金淵鼓笛鉦旗隘市㕓地上鬼神行白晝夜中風雨洗青天妖氛旱魃驅無迹和氣歡聲兆有年車馬縱觀兒女事老夫閉户讀韋編寄陳仲麟景仁檇李城邊送客船梅花一别又三年清風朗月思元度駿馬名姬羡謫仙湖海倦遊豫白髮園林真樂子青氊楚生卜宅平生志歸日相從學力田豫自存博解印歸鄉心日夜相趣古人有名山川處輒忘歸然歸未易忘也夢得一聫續之業風宦海足波瀾常憶西湖南北山熟處肯忘生處樂别時雖易見時難得此二句奉親還舍君先得投檄歸田我未間漫説桃源人迹絶故園松菊半荒殘送張叔夏遊金陵肯向金淵暫泊舟相逢衮衮别方休移宫換羽周郎顧詠月吟風太白逰吟風詠月出太白墓銘范傳正作牀上無金猶好客尊中有酒可消愁明朝又作臺城客細看青山似洛州送陳壯甫稅使歸金陵征商廉幹不言錢異事同寮又一年美譽正香金瀨曲歸心已在冶城邊家傳簮笏青溪譜風送旌旗上水船小草相依行有日莫須摻别重凄然蕭饒州見寄次韻夜來聽雨夢仇溪夢覺招邀客賦詩我自不分官冷熱子須能别酒淳漓江頭風順鱸魚到天外春歸杜宇知十日菊花元不減恰如六月見蒲葵喜晴新嵗連朝喜遇晴宜人宜穀最關情郊原尚覺春光薄市井先傳米價平趁暖飛蟲生滅易向陽征鴈去留輕北門冷掾無公事間看官梅野柳爭題趙千里溪山春遊圖一溪流水數家村短櫟長松映蓽門不是花通輞川口祇疑路隔武陵源小橋瘦馬行春色逺浦青山帶雨痕樓觀玲瓏雲縹眇須知畫裏别乾坤寄武康王居正曽向清溪采白蘋江東日暮别經春投金瀨上思歸客浮玉山前憶故人千里雲萍應念我一庭風樹敢忘親挂蓑石暖苔衣厚擬買漁舠作近鄰寄梁中砥句曲峯巒翠倚天琳宫瓊館宴神仙水程才隔一百里腳債未償三十年幾擬看山携酒去相期聽雨對牀眠何當撥遣塵間事一試松根喜客泉寄子野西窗隱几讀南華頗悟亡羊與戰蝸住久不知身是客歸休誰謂女無家向陽野竹先抽筍待雪官梅欲試花我愛睡鄉真樂地底須頻喫玉川茶黑兔何年偷舐元霜鼎變却蟾宫玉雪姿毛頴未封先試墨褐衣乍著便披緇移來暘谷烏相對躍入隂山鬼不知蹤迹分明豫甚愛正當秋曉月明時和劉君佐韻寄董靜傳髙士雪暗江湖入暮年何人葦外小延緣水痕不動玉平岸春意欲回花滿天懶出恐消桐屐蠟醉吟忘上苧袍船行當歸學林和靖結屋梅根伴鶴眠驚蟄日雷坤宫半夜一聲雷蟄户花房曉已開野濶風髙吹燭滅電明雨急打窗來頓然草木精神别自是寒暄氣候催惟有石龜并木鴈守株不動任春回鴈去離羣野鴈在中庭馴養經年羽翼成因為哀鳴殊可念豈知飛去太無情天隂月黑多機穽嵗晚山空少弟兄願爾水田常飽暖春風早問北歸程寄屠存博三年塵土白鬚眉擬向西湖濯客衣林下杜鵑猶勸去海邊鷗鳥亦知幾及瓜將得葵邱代存菊須尋栗里歸見説中山屠博士鄉心也趁白雲飛再寄子野霜力風威各逞強老夫絮被不離牀一貧已幸官將滿百計無如歸最長别後交朋難得信夢中文字不成章從來心似梅花白莫入東風桃李場寄鄧善之幾年不寄子公書忽向燕南遺鯉魚天逺地遙歸未得男婚女嫁事何如壯逰自致青雲上漫仕誰憐白髮餘西浙林泉俱可隱毋忘舊約共間居醉聞杜宇幾日冥迷醉夢中醒來衣袖裹春風杜鵑未歇鳥聲碎芍藥已開花信空差勝跨驢愁杜老儘教騎馬笑山公卑官安得金貂換尚有杖頭三百銅北村吳園雨中賞牡丹主人留飲不謂村園見此花嬌紅數朵眩晴霞可憐國色天香種竟落田夫野老家略具杯盤供筍蕨已拚杖屨汚泥沙莫愁乳鹿銜春去自有蓬蒿盡力遮官冷不負平生下澤車宦遊卜宅亦村墟家貧纍重須干祿官冷身間可讀書髙桞每聞鶯婭姹破籬時度竹蕭疏西南林壑堪娛晚靜看飛雲自卷舒喜晴復雨早起方誇甲子晴夜分忽又似盆傾黑雲冉冉連燈暗白浪滔滔與岸平芹未出泥先有燕花都委地尚無鶯東橋沙觜多舟楫直下荆溪不待撑五日湘魄能傳楚澤芳何如倒載醉襄陽夕隂空照栽葵圃宿雨難乾打麥場龍去涎留丹井濕燕歸泥落墨池香枉將黍粽沉蛟窟移與江村餉水荒雨才放庚申一日晴天明一日雨如傾烏雲覆地隂隂合白浪侵田灧灧平屋漏未乾連礎潤橋低欲壓礙舟行桔橰不是間家具會聽溪邊鵝鸛鳴雨坐梅霖寒似麥秋天風葛凄凄未脫綿金彈落池盧橘熟紅裙委地石榴鮮汨羅遺恨空千載瀨水間居尚一年蒲酒相邀須徑醉歸尋枕席付髙眠兩年蒲節雨霏微誤我中山采藥期騎馬出門隨所寓看花酌酒復奚疑量慳未易勝金盞臂弱猶堪繫綵絲追憶侯家陪宴賜素紈紅葛翠交枝與子野過永仙觀循西城以歸邂逅李戒甫夕山西爽詩料滿目子野明發詩來豫次韻壞垣荒徑入蒿萊不惹康衢半點埃賞靜偏憐雛笋長趂涼自引瘦笻來杯餘潄齒呼新茗石上題詩剝古苔試問依簷雙老檜何如列柏在烏臺一笑相逢李伯時樹隂匝地緑雲低林梢落日猶餘丈天下好山多在西我醉欲歸須客送君裝已趣尚鵑啼明朝定有新詩句且讓溪翁向上題寓舍在青安門外由是出郊不數里羣山獻狀如遊龍如奔馬如踞虎豹深秀坡陀不一而足似有招引賦詩之意遂約子野再用韻西望寬平倦眼開風收雲翳掃煙埃誰能白日捲簾坐盡看青山排闥來合沓斷岡如引蔓盤陀大石不生苔此中林壑多仙迹何必吹簫更楚臺山列瑶簪束不齊過雲舒卷樹髙低孟郊李白曽行處泰華琅琊盡向西瘦馬自穿幽徑去老鶯猶戀落花啼豈無崖壁平如削留與詩人醉墨題和仲祥大風韻正憂藴藴與隆隆怪得連朝起大風酷日從今宜斂暑大王自古解稱雄中庭老樹吹將折破屋重茅卷已空可是南溟鵾欲化爰居先避魯門東非雨非靁勢可乘柔枝弱葉力難勝疾於健將追奔馬豪似吟仙賦大鵬柱砥潛移黃蟻穴山屏盡啓白雲縢直須少霽飛廉怒水落墟田穀再登巫雲九峯誰割巫山一片雲峯巒羅列比兒孫嵌空自是天生穴剝蝕無非水渲痕霜削秋清連竹色露腴曉翠及蒲根九峯九鎖參差似永鎮仇溪第一村觀雨雨師殿後疾雷先風捲浮雲似擘綿大點成漚添黑潦濃隂匝地暗青天崦中暴長彌漫水墟上平沉沮洳田米直頓增車戽急早推紅日麗金淵宦海黃帽棕鞋隱者便青衫槐笏我家傳一生碌碌空多事六帙駸駸欠二年安樂窩中間有味溫柔鄉裏老無緣浮沉宦海終非願早葺山南屋數椽屠存博教授赴溧水任留飲寓舍只隔山中一日程書船暫泊溧陽城儒冠喜見賢翁季道眼相看老弟兄酒量吞江涼更濶蟬聲送客晚爭鳴青衫肯為琵琶濕笑向天涯看月明寄戚子雲七不能堪一不成間雲自恨出山輕栁枝駱馬愛心斷蓴萊鱸魚歸興生薄宦棲棲留泮水故人渺渺隔臺城對牀風雨何時卜共翦青燈話到明送張巨川歸崇德三載金淵入幕賔轉當繁劇轉精神髙堂多有承顔樂巨室都無切齒人此日吏民爭卧轍他時事業繼埋輪語兒溪上滄浪水有約征衣共浣塵二十五日東風少定辛丑夜西風再作東風已掃九衢埃何事飇輪去復回秋信蘋洲涼漸迫人家蓬户晝難開低田受水祥禾偃亂石飛空巨木摧見説長淮旱無雨蜚蝗幾欲渡江來五月六日晴芮君節卞西仲諸友來泛蒲和韻端午凄涼雨壓城忽然端六報新晴素衣塵暗行人老緣樹隂濃曙日明倦眼冥冥渾似霧憂心悄悄只如醒枇杷薦酒猶堪醉杏子微酸尚帶生用韻答蕭濟翁想君不欠買山錢要學騎驢孟浩然拂袖徑行輕萬里著書直待後千年林泉短褐凄將老齊館孤燈耿不眠明旦履霜何所向大茅峯頂看芝田答徐恕宣城寄别懷古澘然老淚流依稀見月喘吳牛客鄉時序留如燕學舍風波小似舟已恨浮雲無巧夕未知後月可中秋徐卿忽寄新詩札正倚雙溪疊嶂樓江隂何仲禮相訪和答月照空梁幾夢中翩然環佩下天風十年不到澄江上一棹能來瀨水東湖海交逰今漸少英豪見識略相同舊時東野吟詩處何日携壺酹此翁答趙源仲人到中年萬事慵我今况是六旬翁歸心已薄西湖水餘力重修古泮宫官裏簡書尤可畏案頭筆硯豈無功邇來士習殊輕峭願與醇儒振義風交山龍祠禱雨曉入荒蹊陟斷岡多年廟食白龍王要添溪上半篙水不逺山中一瓣香灌木雲昏旌斾出髙田土渴桔橰忙莫疑栖隱無深洞且得隨車雨送涼題王師尹宜晚樓詩髙捲書簾雨氣寒螺屏擁髻赴滄灣去天一握屋上屋斜日幾重山外山地展畫圖增暮景風吹笑語落人間棲鴉已寂歸雲急却怪雲猶未得間慶孝僧自金陵回虎林白下長干住幾年西風入夢即飄然斷橋梅栁全非舊古剎鐘魚大勝前萬里豈宜常作客一簞且可穩栖襌滄江東去風波惡亦欲湖山結數椽如上人歸問浙中友信何年駐錫下山中既見匆匆又欲東燕去鴻來俱是客雲生月落不離空冷泉亭上參吟暢謂文溪飛雪岩前哭老同謂野翁方外友朋詢近况為言已作木雞翁過介卿溪南隱居卜宅溪南逺市喧一經教子守田園邵平未老瓜先熟靖節能間菊自存無白丁來多釀酒放青山入别開門朝衣曽侍天香滿得似荷衣帶露痕悟上人同過史氏隱居經時少暇出郊遊野曠山遙易見秋祗怪朝來多爽氣似緣我輩是清流荒臺古井平蕪濕斜日西風亂葉愁莫笑田翁無欵待緑菱新摘酒新篘懷盛元仁年過耳順欲何如臂膝酸寒齒髮疏千里驅馳還倦矣數椽卜築合歸與山銜落日誰能繫海漲平田自可鋤寄語虎林諸道伴江湖處處有鱸魚秋日懷吾子行秋髙天闊鴈南翔遊子愀然思故鄉重陽正當風雨近三徑故應松菊荒酒酣耳熱狂無益江空目短愁何長青山在望有晴日我欲振衣千仭岡七夕河鼓天孫各老成無愁可解任秋聲癡兒笑月羞眉曲稚女穿針鬬眼明夜半且分瓜果供天中豈識别離情未能免俗消光景醉卧西風夢亦清嵗嵗今宵乞巧樓疏星如奕月如鈎莫將寒信侵房屋肯把間情問女牛兒笑無書空曬腹婦言有酒可澆愁鵲慵竟失河橋約盡日喳喳古樹頭題羣仙圖世代雖殊道不殊衣冠氣貌列仙儒自憐無計攀靈轡豈意相從入畫圖把袂拍肩歸福地抗塵走俗笑泥塗苔痕還繞榴皮相風雨東林壁半蕪永仙觀賞桂劉君佐黃景巖治酒雙桂崢嶸萬竹間雲枝露粟綴髙寒軒窗日日吹香過冠蓋時時載酒看月裏曽春金杵臼雨餘亂點石棊盤乘槎仙子清如鶴一曲霓裳舞素鸞中秋月出復雨有懷葉子文湯明叔溧濵三度見中秋感歎光隂逐水流常是浮雲妬佳月不容老子醉髙樓鱸香易動張翰興鯨背難追李白遊遙憶詩人豪氣在湖天空濶放扁舟中秋待月不見期修玩事在杭州月夕那知常滯留縱有候芭常載酒惜無李白共登樓蛩催織婦貧非懶雲掩霜娥老似羞應笑山翁癡守待滿身風露冷貂裘年年待月引壺觴坐對中庭玉一方靜夜忽驚雲作雨索居空使客思鄉荒雞聲續簷花滴蝴蝶夢回巖桂香何處髙樓見山濶快豫吹笛據胡床賞桂秋來常為桂花忙葉葉西風粟粟涼奎甫宅中開四樹儒珍園後粲孤芳小山招隱人空老朗月當庭影亦香可必明年能賞得一觴且醉此花旁夜聞秋聲西南振響使人驚未必秋聲作此聲萬騎奔馳􅎏鼓動千夫翻踏桔橰鳴初疑潮汐還疑雨只在山林不在城人道今年豐稔兆燈前起舞待天明
