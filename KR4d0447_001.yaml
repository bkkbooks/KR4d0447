body:
  text: 金淵集卷一元仇逺撰四言古詩晨入東寺閲藏行香明星未髙繁霜巳肅姢姢落月猶挂茅屋我馬遑遑我車僕僕晨入緇林坐閲梵牘字竒義奧了不可讀空元無象奚事耳目簡書期程軒冕桎梏顧影自哂未能免俗名教真樂言語榖粟何時式微知足不辱養鴈雍雍陽鳥其居朔方朅來江南雪霜備嘗意不耐暑慮爾早亡乃安水土羽毛無傷仰羡鵷雛俯趨鶩行負影隻立何如還鄉秋風日髙稻粱巳黃且謀一飽勿思翺翔野飲土岡之西竹樹之下板屋三間娛此隱者塒有肥雞廄有羸馬豈無佳菊采不盈把且漉我酒放浪林野莫不飲食知味者寡題徐夀畫牛此大武者二十八蹄茂樹之下豐草萋萋牧童且嬉夕陽未西何如桃林歸去來兮五言古詩送髙仲山通州教授通川得通儒善類蒙善教如此老成人真足重學校我昔客朱方曽窺管中豹言容既篤厚文字入元奧交遊二十年夷險同一操間居虎林麓倚窗聊寄傲忽承北斗勑勇鼓來淮棹華髮映青袍輕帆愜黃帽天晴宜征途芹藻春色到臯比坐可暖三載勤訓導惜哉龜手藥至老方取效載酒遊五山何由共吟嘯送楊志行赴徽州教授峩峩紫陽山翼翼素王宫中藏朱子書頗有鄒魯風在昔三十年我嘗逰其中一溪練帶如環以千翠峰朝嵐與夕霏四景日不同惜哉屐齒折我舟遽云東子今振木鐸出為斯文宗諸生列館下待問如撞鐘明經别同異析理開愚蒙獨坐三鱣堂教思傳無窮庠序足真樂詩書有近功行當自此升豈曰難為容平生韓孟交雲龍阻相從願言夀道體有書附鱗鴻下夀六十本下夀皤然成秃翁繫舟貞女瀨竊祿素王宫暮隨太守車朝迓御史驄我馬劣難騎却與無馬同老病厭徒步足力亦易窮將以馬易牛歸耕田園中聖人有遺訓吾不如老農小園梅巳緑隂忽見一花甚香此枝緑隂繁枝上子如豆一花褎然見香襞苔蘚透雖同梨雲夢亦出桃李右矜驕若自惜終覺老而瘦昔占百花先今處百花後春風少年場尤當敬耆舊答陳宗道見寄蹇豫山澤臞飄飄一鷗似天風忽假便飲此金瀨水朝隨章句儒暮逐副墨子肯嘆飯不足可戀惟酒美賦芧亦聊復久矣忘喜怒尾寧曵塗中人生行樂耳懷人耿不寐一夕三四起江東暮雲合渺渺隔秋水遺我詩兩章意古音粹美敢謂義熙餘及見黃初體君間恥食粟我出慙為米流品敻不同黃河貫清濟存耕吟寄薑景星斗祥吾不學老農種此方寸田善雨日培壅安得荒旱年詩書災且畬芟藴毋蔓延種固有厚薄穫豈無後先先疇畎畝在後世兒孫傳何憂換八百奚止取十千却笑多牛翁轉瞬無炊煙我獨遺以安本固實自堅耘業待嵗晚韓公嘗勉旃插梅偶得數枝梅插向陶瓶裏置之曲密房注以清冷水肌膚若冰雪寒極粟不起歲晏且聞香春深看結子示沈道人有涯本無涯後覺即先覺名利念既輕生死路不錯棋枰幾勝負只看末一著寄語耽酒人飲時自斟酌懷白石社尊師道堅我思南山陽谷神何綿綿松下笑相别惚恍忘歲年寄我猶龍經文字入幽玄終期白石頂擊竹歌逰仙和子野見寄十二辰體良工鼠鬚筆戢戢囊頴露抄詩節經史汗牛車載路信知文中虎一代人不數細聲笑蚯蠅妙趣忘魚兔東野龍無雲胡為乎泥中蟠屈如睡蛇虛此雲夢胸且騎欵段馬野服隨田翁相羊山澤間真樂樵牧同開林斬猴杙種花續春意他年處雞窠偃蹇增老氣錦鯨卷不宜貂狗續亦易老硯磨豬肝翰墨作逰戲和卞仲祥吾友卞南仲别我何匆匆家有六男兒乃與不死同阿祥更頴出亹亹有父風翰墨既瀟灑文字猶研窮西園蓋常飛北海樽屢空霜寒瀨水淺蛟龍若為容我將歸西湖春風入修笻期子梅花下一酹孤山翁和張仲實見寄天地有義氣五行秋在金風吹庭前樹亦作清商音遊子初離羣百感集一襟諒豫老冉冉無復謡善淫吾方用吾悟安計他人心古交色不變百錬如精金一别又三月書札乖嗣音相望隔一水離憂盈中襟秋陽不能驕秋雨不能淫會面不可期月明千里心和蔣全愚韻金壇有耆英學博聲名早摉竒薄莊騷稽古極羲昊君甚似樂天稅冕居履道息逰鬻駱馬尚友敬胡杲我生六十年獨欠識此老來逰溧陽學文物委秋草黃沙􅀈人目忽見石皓皓君壇髙難陟我壘虛易搗新詩十八韻韻韻俱壓倒交情託以宣一字一大好自慙溝中斷未足被華藻但令小兒輩藏弆以為寶相望衣帶水波弱限蓬島玉石資蕩磨鐘鼓宜擊考何由即會面疑義共探討豈無問字酒可以濡吻燥昔為堅多節今為科上稿窮逹等醉醒何庸寬懷抱和金沙蔣文海韻干祿非良圖好遁實素抱昔為駕壑松今作出山草茫茫海嶽隔冉冉齒髮老淵明書甲子拾遺歷天寶迷塗諒未逺貴在知幾早我聞茅峰下曽有卧龍人風雲未承運淵潛聊自珍世無卞和氏誰辨玉與珉緇塵化衣裳我獨潔其身攬鏡忽自笑奈此白髮新海翁古徴士接武諸公後聞名三十年傾蓋即如舊示我伐木章無能出其右籊籊秋竹竿坐睨蒲質朽試問五兩綸何如一杯酒昔我客朱方曽識三數公獨欠之句曲遍走山西東向來劉與王漫塘實齋疇能繼髙風今我來金淵尸祝素王宫閲人晨星稀見子夕照紅何當分鄰燭竹徑相與通乙巳歲三月為溧陽校官上府經烏剎橋和陶淵明韻一日不見山胸次塵土積老來志益壯清逰等疇昔鍾山草堂古每恨身微翮况是佳麗地牛馬風不隔遑遑問征路冉冉供吏役淵明田可秫肯為五斗易石橋跨淮水岐路由此析俗駕何時回為爾謝松菊為金陵宗人賦雲谷詩英英天上雲洞洞天下谷皎皎谷中人精神皎如玉卷舒一何心怡悅亦自足朝采孕丹砂夕氣被林麓豈無茯苓芝隨春入鋤斸自是長生苖根本元不俗三千年桃花八千歲椿木不如採藥歸枕石伴雲宿西廟古檜和卞南仲韻竒木有古意愛古人亦竒嘉禾老君觀毗陵烈帝祠二檜棟梁物俱逐劫火移朅來溧城西見此鐵石姿靈貍肯薦骨死豹仍留皮拏空有爪龍踞地無角螭三株兩失葉簷溜傷南枝僵立萬雪霜坐更幾鄰儀我將護赤欄甃以蒼石墀深根直不朽雅操堅自持棟梁與薪槱待用各有時罔俾孤山樹專美坡仙詩學舍自吟金淵文學掾旅食經歲年石田薄有收儘足禆俸錢絲毫了無補教養愧前賢竹添講堂後柳栽泮水邉匏花粲籬落藻帶舞漪漣土龍欲致雨何能起雲煙革帶孔漸移老癯非學仙木居士何者求福真徒然送虞師憲赴延平書院山長我師文靖公李侗一傳子朱子佩服中庸書靜中識根柢秋月湛氷壺瑩徹無瑕滓延平建精舍盛德宜世祀君往坐臯比文行成粹美秋風送書船南上二千里訝君來何暮襟佩爭倒屣鳴道鐸方振問字酒已俟九京如可作文靖公亦喜豫友有黃功子敏昔分教於此頗知文風盛十室九儒士是行若登仙劍氣炯青紫只恐席未溫思歸慕園綺題西梵一翁雙清軒上人碧雲房苔地不盈丈古石六七株修竹覆其上石兄既竒秀竹君亦髙尚歲晚永相依屹不染塵坱方參香嚴師曽識牛丞相解鞍時一息吾其得間放山泉為惠君疇賦空青穿秋旻瘦白噴夏雪若非林下士誰識此髙潔山中非無雲蒼狗隨變滅山中非無月隂晴易圓缺不如泉混混萬斛常不竭洗耳塵即清釀酒香愈冽一醉三十年至味過麴蘗翁意不在兹勿為醒者説梅夢緗梅眩晨霞素梅迷暮雪一翁著花間氷霜殊皎潔蜂蝶猶未知香味老逾烈夢中識歸塗踏遍孤山月續夢一夢續一夢夢短寒夜長顛倒無首尾哀樂迷存亡枕上忽自笑歷歷見未嘗至人本無夢有夢其何傷魚旐農夫喜熊羆男子祥吾年過不惑夢覺久已忘未來尚曖昧既往恐思量不知邯鄲道幾畨熟黃梁奈花似海棠林檎但葉小異東風擅紅紫顔色分重輕愛此奈子花嬌豔何盈盈未開足標致紫綿燦垂纓開繁胭脂褪徐娘老而貞俗稱為海紅結實葉底頳來禽難為弟海棠難為兄我評此三花同出而異名一枝插銅壺坐玩心目明安得劍南樵素縑為寫生題仲賔竹石淇園緑猗猗昌谷黑離離謫仙硯池底茁此兩三枝輔以小崢嶸標度尤崛竒願堅歲寒心勿為風雪欺暢師同玉上人逰茅阜朝辭二竺寺暮宿三茅峰紅樹落一葉白雲深幾重逺遊喜無雨清興尤宜冬遙知天壇上會與仙人逢上人家海上喜從名山逰昔聞三茅君隱在千峰頭霜寒草木瘦歲晚泉石幽不見梁邱伯使我心悠悠懷中砥夜醉山翁醉如泥夜半方醒然既莫省宇宙况復知歲年間愁置度外大道在目前日飲豈不佳苐恐無酒錢題西山真先生像何年霜月子寫此西山真峩冠褐寬博詩書發精神可以置巖壑可以登麒麟斯人不可作令我思乾淳客來驚睡長晝清和時惟有睡鄉美宰豫邉孝先毋乃今我是門外有客來推枕矍然起請啜一杯茶萬事且不理次韻蕭饒州見寄漢傑時引年卜居溧里至人本天遊上古惟野處如何種菊者亦勝封千戶萬鍾且唾去况復問阿堵先生東陵侯成敗久目睹幾程上金臺一節綰銅虎肯從赤松逰餐芝擘麟脯溫故窮丹鉛投間棄圭組自是橫江鯨終然辭網罟獨醒笑衆醉此舉冠千古二疏三髙後欲數指難僂毋煩北山移猿鶴當起舞昔寓南國居日與蕘牧處今營西郭居官梅映窗户硯山如可博尺度先畫堵此計當勇決結構須快覩伐藤斷長蛇卧石凛伏虎山厨富笋蕨客至當修脯野芳散紅紫粲粲五雜組放懷山水窟脫迹名利罟平泉緑野堂盛事追往古願學樵夫拜相從丈人僂應笑趨炎人奴顔八風舞過嶽公故居赤腳踏層氷素蟾浴清水可憐偷桃兒竟以寒餓死木瓢挂空壁蠧册堆破几有子如矮奴踉蹌入城市剪白鬚臨鏡忽自哂公然白紛如稚女眼最明為我剪白鬚髟髟如素絲不堪紉破襦參差茁秋草蔓衍不可除明知我已老既白難再烏無肉令人癯眼昏妨讀書顔駟燭之武吾非斯人徒寄史貴質延圭丁未同庚淳祐六十翁生遇時節好朝逰漁樵社晚入詩酒保不為名利縳剛被花月惱時發少年狂未省身已老強歌無餘歡聞者笑絶倒齒髮漸凋疏形容頓枯稿平生千金軀豈不自愛寶幸然本根在收斂尚及早何必大藥資尫羸多夀考也無政事堂也無沙門島錢儒珍家賞桂寶孫客至當飲酒醉此金粟堆秋風何時到叢樹參差開馨香逆人鼻蓓蕾藏聖胎攀枝折其榮落穗浮酒杯後夜有佳月弄影須徘徊紅袖歌未終畫角毋庸催涼風涼風撼庭竹起舞如翠蛟亂葉打窗來卷盡破屋茅飛雲行太空萬竅爭怒號煩暑一掃淨解我心鬱陶夜半見月中夜月初上照我東床明我心本無事展轉寐不成仰觀烏鵲飛俯聽蛩螀鳴念適從何來衣食非素營三年然後歸兒女各長成婚嫁願早畢吾其師向平與楊志行郭斗南馬德潤屠存博吕公弼僧義慶遊鍾山以峰多巧障日江逺欲浮天分韻豫得浮字昔讀寶公傳今作鍾阜逰緩行萬松間直上千峰頭古塔表木末寒泉貯巖幽遙觀江流奔始知此生浮甚愛雪竹庵逸駕吾將休試涪翁題鄭佽硯我有古鏡硯肌理細密勻沄沄散角痕巨口細魚鱗涪翁銘其背文字極雅馴鄭佽彥相者不知何如人回首數百載想見元豐春晴忩試磨洗墨舊兔頴新携歸供行齋侑此金石身蟋蟀蟋蟀一何多曉夜鳴不巳居然聲相應各為氣所使零露聊飽蟬落葉才庇蟻秋風滿庭砌安能久居此愁聲不欲聽我聽差可喜平生勝負心一笑付童子郊行集句今日我重九東坡無錢對菊花杜陵昨夜雨鳴渠東坡既雨晴亦佳杜陵出郭望西郊杜陵山林迹未賖杜陵顧憂斯人飢昌黎僵仆亂如麻東坡淵明胡不歸東坡吾居巳及瓜東坡豈無一尊酒昌黎誰敢負年華東坡聊為山水行東坡玩竒石路斜六一門生與兒子東坡邀我至田家浩然留連向暮歸樂天爛醉是生涯杜陵種菊鄰舍送我菊惜無盆盎栽分種東籬下倚忩日裴回初看蓓蕾青黃蘂參差開霜後苦無花老眼生塵埃得此少自慰可以薦一杯更用數日晴南枝須有梅菊軒吟為劉君章作大江秋風髙紅葉紛滿地采采黃金華專此秋富貴主翁庭宇靜霜日自清媚豈不懷淵明異榻同夢寐春融桃李門一粲開落易願言堅晚節香淡有真意平生觀物心飲水知秋味敢問楚人醒何如晉人醉通甫弟歸里詩霜重江水縮艤舟江之湄子今戒行色豫亦數歸期巳迫葵邱戍何求買山資酌别苦無酒秉粟供妻兒風雨不出儒官少公事間坐如家居閉户聽風雨重讀架上書豈無借書瓻小酌勿用沽豈無苜蓿盤園丁送嘉蔬溪童把釣竿時得徑寸魚采薇拾橡栗視此巳有餘懷哉天地恩不棄無用儒舍此將何之狂士多迷途終不如歸田一蓑溪上鋤漫興驢鳴有何好晉人多愛之胡不大堤上隔花聽馬嘶胡不茅屋下帶月聽荒雞我疑古之狂矯世本尚竒蠟屐栁下煆結髦劍首吹端是味無味以待知者知滿腔浩然氣抑鬱無所施引頸一長鳴萬里風雲悲敢問駟與驄立仗夫何為九日鄰翁招飲佳節喜新霽作意登南山兹山雖不髙亦足供躋攀平明放舟出日暮騎馬還行止不自由寸步千里艱北鄰朱公子言笑破旅顔相與一樽空徒得半日間人生各憔悴仕路復間􅱕六十始平頭甲子須循環粲粲黃金花才見秋一斑忍以髮膚脆犯此風霜頑何如歸去來期我巖壑間戒飲腹無貯酒腸小飲輒大醉醉餘嗽即作痰唾連涕泗酒亦有何好上策當自治無錢賒不來不飲特易事何如飯疏食飽矣曲肱睡莫笑我獨醒中有至樂地飲少此中無他腸飲少乃輒醉眼眩力不支便欲投牀睡頓空名利心願棄人間事淵明千載上當復知我意有懷龔子敬子中兩龔昔所慕二難今是似簞瓢魯儒生衣冠楚君子相期歲月永不為弓旌起極目暮雲平修筠悵豫倚和子野少年挾英氣聞雞慕劉祖老來卧蝸牛風雨懶出户酒空薪炭盡景况詎堪覩自嘆衫袖短豈曰不善舞此日始生日避喧作溪行出門阻風雪僕瘁馬亦驚歸卧春一窗隔窗聽雪聲擁衾守藥鼎客至慵出迎顔色日巳老何由得青精未能歌雪兒聊復呼麴生夢中逰西園一壺梅下傾報恩寺權公方丈金淵多寶地此地殊幽深一錫得安穩豈必棲山林臨池照佛面見竹空人心江楓千百年時作海潮音昔康莭先生題安樂窩詩中云樂見善人樂開善事樂道善言樂行善意此即吾友朱仲明樂善齋之意也繫之以詩人生有至樂主善以為師善端本固有樂處亦自知我思舜之徒雞鳴日孶孶簞瓢在陋巷顔氏其庶幾之子芝蘭室書傳為針規量力行好事固窮無妄為何似安樂窩受用堯夫詩豫久客思歸以秋光都似宦情薄山色不如歸意濃為韻言志約金溧諸友共賦寄錢唐親舊自我來溧陽四見木葉秋泮宫久敝漏量力完且修幸然土木備及此工役休巍巍大成殿勢與鄒魯侔聖賢日云邁可以遺象求捫心了無怍一掃築舍謀咫尺三茅山乃獨欠此遊且須歸去來速為營菟裘迢迢淹水上有亭曰寒光水天散鷗鷺四望山蒼蒼向來于湖翁詩詞題屋枋幾思一遨遊歲月飛羽忙聞有白龍寺石塔標鐡梁老僧頗能吟年來曽逰方須乘未歸前秋晴呼野航我非章句儒亦非漁樵徒少年逞粗豪提筆賦兩都老尚著儒冠却悔識之無既難棲山林又倦逰江湖一官僅供口康濟不在吾秋風方戒寒正道日荒蕪行矣且歸耘寸田聊自娛江海寄孤篷飄飄一鷗似汲汲謀稻梁欲去行且止淵明真逹者解印如脫屣五斗何足云可但折腰恥我嘗慕其人出仕亦漫爾客行入歲晏田稼逢水毁逝者既如斯吾屬可去矣肯負白鷗盟西湖釣秋水早從方外逰志不在婚宦采薇陟西山采藻涉南澗拄杖僅過眉短衣不掩骭一為火宅纍漸覺有憂患難任臣朔飢俯就博士慢大勝國子師三年腹藜莧棲遲行路難堅忍為客慣昔為泛泛鳬今為嗷嗷鴈幸免箠楚慮官事粗易辦曷不歸孤山梅花臘前綻秋空不肯明風雨滿荒城田父遮我説重九最喜晴此日晴色好大田足西成一冬暖如春絮炭價亦輕我雖將去官於人獨無情去年冶城叟卞南仲也采菊餐其英今兹隔存殁使我心怔營出門悵誰語巵酒當自傾威鳯巢深林神龍潛巨壑泥塗困螻蟻城市防彈􅗤小草不自貴巳鑄出山錯豈知草苦淡有味俱不惡霜降水澤枯歲晚木葉落榮枯識寒暑是非悟今昨不見粘壁蝸甘以退為樂二休行且三可但耐辱莫去郭十五里翼然屏風山上有看經院創始升元間山潤易生雲竹嫩未作斑登髙佛閣小四面青回環空門事彌多永日僧不間歸徑路委蛇班荆履孱顔信美難久留道逺足力慳遙知故山月問我何時還喬木足秋聲紅葉表秋色因之念湖山恨不生羽翼形留神巳馳遊倦交漸息西鄰夜砧發東鄰曉機織我亦有敝盧松菊暗荆棘北山百年墓苔竹手所植今長尺若干霜雪頗自力西風龍蛇蟄暗雨山林黑東望會言歸免我長相憶七十古所希我今六十餘干時本無策謀生術尤疏就食泮水宫學圃乏薪蔬凛凛座無氊踽踽出無驢厭厭尊無酒呥呥食無魚官居古云冷巳矣當歸歟緬懷二女子夫家住桐廬三年千里别曠久不得書曰者遣一力還家問何如江濵桐君山土肥藥堪鋤山根有間地或容房客居未仕每願仕既仕復思歸了知歸來是宜悟求仕非干祿本為貧元非慕輕肥巳昧好為戒復貽素餐譏時艱士失業十家九寒飢豈無禹稷思力薄願乃違吾門可羅雀載酒人來稀下考劣巳書歸心疾如飛眷言長途馬老矣思脫鞿晝短歌意長式微兮式微人寄天地間官爵寄所寄所寄本儻來得喪亦常事何哉淺丈夫以此芥胸次逹人視為輕譬彼樗蒲戲役滿須過更代者乃未至故鄉隔太湖一舸歸甚易秋髙山骨露始見松竹翠依依古梅村是中有深意遊子悲凛秋秋盡行當冬雨露變霜雪寒色日以濃豈無紫綺裘綻裂誰與縫不如早還家山林專素封掃松棲霞嶺結茆慧日峰山南與山北春風入修笻時止可以止道隆從而隆抱膝且長吟吾其師卧龍盆梅有客送苔梅來自馬塍裏斜枝巧盤折的皪數十蘂意欲媚春風寧免少屈巳獨憐鐡石腸竟作柔繞指他鄉忽一見少慰空谷喜何當解其縛條直有妙理幸不入俗眼入俗梅亦恥居逰行寄費廷玉大振繁華錢塘郡佳麗金陵州吾生抑何修兩地得居逰杭也數年别升也幾月留鍾山草堂靈林壑殊清幽開窗眺龍灣大江日東流鳯皇非故臺不見白鷺洲冶城塜纍纍青溪波悠悠長干塔尚在瓦棺閣巳休雨花峙巖顛錦石爛不收層樓天下無結構如龍舟六朝王氣歇故籞成荒邱至今秦淮上尚聞商女謳山水如此佳見有此客不懷古復思鄉日落川雲浮惜無老樊川酒酣吟杜秋雪忽驚小窗白開户雪如此去年臘前無一白從此始霏霏甚可愛落落勢未巳炯炯眼界明沾沾田畯喜靜聞野厖吠立見蟄蝻死鼓腹飽可期勿畏寒墮指窮簷絶煙火閉糴三日矣開倉糶官糧太守如父子
