body:
  text: 金淵集卷六元仇逺撰五言絶句小齋四花艾納護春香横枝偃霜月絶憐玉妃面化作鐵漢骨右梅翠翹玉搔頭湘妃赴蓬島如何譜騷人不收此香草右水仙晶晶雪前黃矯矯霜下傑秋香寧可衰相與全晚節右菊别作一家春故畹已禾黍黃香從何來誰為東風主右蠟梅題扇溪山隔岸好風雨過橋危何似髙樓上停雲且賦詩程公眀茂樹坐終日水流心不競誰識山中居萬動歸一静卞平叔泉急喧溪碓山深怯瘦驢翟湯如肯隠來此卜幽居翟益之紅紫委塵土緑忩清畫長安知兩三竹風已作秋凉郎景韋欹枕聞春雨閉門見緑隂可人歌扇底猶有惜春心張徳逺題趙希賢所藏墨竹一竿千百葉鳯尾翠交加曽向僊壇種和風掃落花新梢霧如沐斷節霜不枯西牕夕陽下此君何可無謝家庭下玉化此青琅玕風標夐不俗誰謂骨相寒直節豸獻角低枝鸞振羽古色鎮蒼然非煙亦非雨題畫竹誰謂藋藋竿乃不如勁草北風動地來直節未易倒净洗碧娟娟顔色如少年窻前風收雨階下笋行鞭直節老欲枯初篁瘦而勁祖孫知幾傳不改君子性新笋籜半含節下粉猶緑指日南風來吹作階庭玉五更僕云月未落或謂夜過半曉眠我正濃漫漫何時旦一雞一雞鳴夢覺天未曉誰較夜短長我睡不可少山寺鐘未鳴城樓角已奏角聲正可聽欹枕續殘漏月轉參旗横梅花夢方熟羅浮山忽來毋乃地脉縮杭城打六更市樓已攅㸃流年莫催人老色將冉冉丑夜方向寅被衾冷如鐵江南貧者多奈此霜加雪愁多怯長夜况乃衆病歸何待六十年老矣當知非雁鳴鶴亦鳴不待雞戒旦平生善利心一鳴思過半宰相當此時已入待漏院我輩獨何人擁被猶困倦爐藏火尚紅雪映窻已白夢遊無色界不知身是客枕上雞鳴夜過半霜氣入孤衾嵗時將脱屣鄰家方擣砧出門雞一鳴僕馬蹋曉凍豈知牧牛兒正作維魚夢一官振饑荒一官覆水旱州里多應酬田家少愁嘆七言絶句三學士圖李紳能歌詩穆宗召為學士與李德裕元禎同在禁署時稱三俊情意相善文宗時召兵部尚書王起禮部尚書許康佐為侍講學士中書舍人柳公權為侍書學士毎有疑義即召入便殿顧問謂之三學士恩寵異等今所畫不知何人予將叩之舜舉之徒三賢品坐一枰棊日永官閒對紫薇好袖玉堂揮翰手不爭勝負是知幾自笑謁客登門不敢嗔强顔應接暫時親一官本自如氷冷更有依氷借暖人正月辛酉大雪三首繽紛萬片打窓來驀趁斜風舞却回可怪今春寒特甚梅花一半未曽開酒樓柳絮白紛如帶雨隨風蜜又疎萬景天全羣動息玉堂人老卧茅廬從來春雪有人嫌六出雖工亦漫然客舍無氊渾可事爐無薪炭褐無綿閏正月十三日夜雪東風散雪亂如麻擲瓦敲窓細撒沙只恐市中薪米貴不愁江上落梅花花竹圖梅癯竹潤楚蘭馨相約凌波作四清最愛此君秋一片湘江煙水曉初晴倦繡圖花殘院静晝隂長困思瞢騰下繡床肯信村中蓬鬢女夜燈辛苦織機忙書齋壁苔色排簷緑上階詵詵衿佩集虚齋耳根厭聽閒風雨惟有讀書聲最佳風收細雨斷梅天晝永身閒但欲眠木枕桃笙真有味廣文不用歎無氊早赴東寺行香詩衝風冒雨過南橋馬上聞鐘覺寺遥客髪頓驚秋信早飛蓬落葉兩蕭蕭喜晴一簾遲日忽開晴側近園池得散行儘勝草堂窮處士有花有酒作清明東郊少步髙低逺近樹隂濃杖屨閒行萬緑中一片殘紅無覔處却疑身在碧紗籠野風吹樹廟門開神象凝塵壁擁苔笑爾不能為禍福村人誰送紙錢來寒食雨三首山色空濛寒食雨楊花零亂溧陽樓老人豈有傷春事酒後情懐似感秋監官州牧趣修圍里正喧呼急報饑店舍無煙雞犬靜山村桃李已空枝梨花白白柳條青閉閣焚香奈雨聲聞道清明明日是江南風土只宜晴讀陳去非九日詩憶得甲辰重九日宣和遺恨幾畨秋蔣陵依舊西風在一度黃花一度愁秣陵鑿山疏水出長江王氣如何可厭禳後五百年依舊在空教晉帝笑秦皇龜脊羊腸九里汀芫花燦燦麥青青此生不踏江東道將謂金陵即秣陵清正庵葬秦梓㓜女嗣華處秦女吹簫躡綵霞孤塋幽舘掩梨花龍盤金寫崇真字猶是寧王賜嗣華猿圖天竺寒泉夜月明洞深曾聽兩三聲秋風木葉圖中見比似前回太瘦生王母圖蟠桃結實許誰偷笑作承華殿裏遊紫輦不留青鳥去小兒空識茂陵秋題史壽卿二畫香草何時號水仙翠翹羅襪步蹁躚風標宜作梅花伴不入離騷亦偶然少年曽讀在原詩忽見飛鳴傍竹枝憶着江南好兄弟嵗寒風雪欲何之題呉逺秋塘雙禽昔年曽聽雪兒歌此日池塘見敗荷寄語鶼鶼春已去白蘋紅蓼奈秋何題江貫道雨溪晚釣卷後雨後滄波泯泯流樵夫歸去有漁舟江郎縮地能如此何必雙溪疊嶂遊占風露立修筠鶴表同戯拈紙帶為占風誰言心動非旛動我本無心似太空田上暮歸兩鬢西風客帽斜晚雲横嶺月籠沙桑疇屈曲人蹤絶螢火飛來照稻花酒邊儒官冷落似村居蒲艾葵榴色色無却有一尊春釀在醉眠猶勝楚三閭端陽正是獨醒時閒坐難忘一酒巵有客似憐官况冷山童日午送戎葵卞園送葵四皓圖本為當時國本安白雲滿袖出商顔山中終是通人跡不似圍碁在橘間題趙信國墨梅後書宋廣平賦廣平鐵石清便賦信國水墨横斜枝總是平生和鼎手更憑誰寫簡齋詩素衣喜不污緇塵貞女江頭見似人桃李門墻零落盡江南猶有一枝春題李益師謙所藏和靖吟梅圖瓶揷梅花一兩枝逋仙隠几自吟詩北風釀作西湖雪不顧山童凍得癡寄周吉卿慶孫采菊籬根蘂尚青開門稚子喜新晴笑翁錯料人間事風雨如何不滿城四壁寒蛩已可憐一庭風露轉凄然杜陵便是歸來早也有荒閒負郭田日日言歸未得歸翻令兒女笑寒饑而今已覺歸非逺為報山猿野鶴知東觀徐錬師松隠丹房景昭仙舘幽深竹覆墻風傳石鼎煮茶香門前老樹髙如盖乞與樵夫話晚凉蘓仙行部溧州時曽賦黃冠白鳥詩八十鍊師猶健在自鋤松下取苓芝晚晴濃雲忽雨散秋聲屋壁斜捎溝澮盈一陣西南風截斷月華且讓夕陽明寄京口諸友郡邑山川我舊遊歸舟千里十年秋相逢若問村翁信貞女沙頭狎白鷗思歸寄張仲達崔進之淅淅秋風吹葛衣新寒已到讀書幃宦情客况俱牢落不為鱸魚也合歸不為鱸魚也合歸山中雞黍正秋肥東籬菊在家來好莫學淵明較是非書齋穀雨宜晴花亂開一壺春色聚書齋園林此後無車馬竹杖芒鞋政自佳宿范譓卿書房子順蕙雪銷遲氣壓燈偶然素被共姜肱老來頓悟妻兒累却羡山中有髪僧雁多雁聲多處水瀰茫西渰東湖足稻梁纔過蘆汀好棲宿幾曽一一到瀟湘偶作寄李良甫閒官長日無公事靜室焚香讀好書飲水飯蔬差可樂妻兒休嘆食無魚山中有雲難寄君庭下鳴蛙殊聒人他時尋我江湖上不是元真即季真寄周吉卿慶孫閒居偏愛十日菊歸計何資三月糧肉食不煩憂菜色田家粳稻已炊香懐土懐居小丈夫首邱秪覺老心孤須營浙右歸耕地五福星明正照呉老來足力覺全衰一日山行兩日疲歸去蹇驢須買得山中出入不嫌遲偶見詩人作事例迂踈纔見佳山擬卜居湖海歸來餘一􅓩買山生計竟何如詩嚢劍術走風塵要買桑麻二頃春可笑田連阡陌者元非識字讀書人贈珪上人一塵不染俗難干百事無能心自閒我道老僧癡未絶有時采菊見南山山寺雪行圖送逺上人歸萬壑千林鎻暮寒瘦驢踏雪入禪關流澌滿澗泥橋滑少待春晴却出山題五牧蔣氏所藏閻次平小景緑蕪紅葉照秋明白雁孤飛我獨行誰識草堂窮杜老江南江北正關情題湯松年畫卷貌得人間真乗黃曹將軍後有韋郎奚官牽挽猶西望似憶春風苜蓿長紫蠟團心栗玉鬆荼蘼香色似同宗因思弄蕋攀條處花刺勾人曉露濃溧水道中步屧春風白馬橋車溝泥滑路迢遥眼前未識千紅紫但見新黃上栁條五峯合沓擁東廬泉落芳塘旱不枯空鑿秦淮三百里六朝王氣幾曽無中秋客中㠶落西江下淛河溧陽酒賤醉亡何月明正照山公影自覺今年白髪多浪洋舟中輕舟十里過溪莊桑棗成隂柳着行不見玉山嵇叔夜西風低草見斜陽和岳國華落魄居塵逈出塵丹房芝术自生春瓊州太守名家子不是尋常賣藥人廣文飯少甑生塵老去衰顔酒借春吟癖何曽醫不得古來清瘦是詩人倚月大江東去月分明烏鵲南飛露氣清如此嬋娟人不愛倚樓獨立過三更月上月到東牕夜正中人間天上廣寒宫蚊蟲血食三千國盡被西風一掃空題煙竹圖楚山晴雨未分明淡鎖蒼筠曉更清渾是一江秋色染只疑無處著秋聲憶窊石章氏女子湖樹江雲隔杳㝠千峰萬壑夢中青懸知茅屋孤燈下逐字教兒讀孝經題孟浩然圖風吹衿帽不知寒欵段奚奴凍亦頑縮項鯿魚無可釣歸鞭遥指鹿門山立冬即事二首細雨生寒未有霜庭前木葉半青黃小春此去無多日何處梅花一綻香凄風浩蕩散茶煙小雨霏微濕座氊肯信今年寒信早老夫布褐未裝綿送客湖橋赤葉岡頭送客行峰回路轉石橋横小春天氣晴偏好禾稼新收麥又耕别酒離歌送馬蹄歸鞍斜日故遲遲小兒拍手山翁醉江左風流一晉時題畫紛紛鷄鶩一㝠鴻全放全收旦暮同各為稻粱飛不起偶然相聚小池中天上髙飛地上行終難萬里附鵬程鷺鷥股肉無人割老守菰蒲過一生野籬豆花小白槿花紅野屋籬門處處同無限春風桃李占却將顔色媚秋風二馬圖平生自比九方臯牝牡驪黃骨相髙寄語金臺求駿者精神元不在皮毛紀事圩田平沒石田枯秋暑如蒸雨竟無六十年前曽記得步行一直過西湖淳祐丁未亦旱予始生龍君鼎鼎出雲關分祀仙宫佛刹間兩月更無涓滴雨問君何日可還山柴扉深閉百蟲秋落葉幽花露未收野僻了無雞報曉啟明星在樹梢頭馬斃三首曉廐驚呼我馬瘏塞翁一笑欲何如西郊或有閒迎送却向東家借蹇驢苦無馳驟但加餐馬性由來不耐閒官滿馬亡歸去好且騎白犢看青山我無筋力汝難騎埋汝郊原有敝帷二尺箯輿元自穏不勞鞭䇿强驅馳鄰家曉雞嚴城鼓角送鐘聲頃刻三更四五更却是鄰家雞唱凖不差消息已天明憶桐廬二女子女生來願有家耕桑隨分各生涯誰知我輩鍾情處看過桃花看藕花冲真庵詩洞房深鎖老雙成門徑幽修石沼清萬紫千紅秋已盡眼中黃菊最分眀落桂養成花魄是輕隂風露凄凄巳滿林到底難磨秋富貴一庭香粟萬黃金冬夜和陳道士韻焚香讀易樂閒居參訂先天太極圖人道三分程氏傳較他漢上有差殊聞道孤根暖巳回扶笻攜酒出山來數花羞澀西坡上也當春風一度開石銚溪芽活火烹旋燒敗葉帶枯藤路遥難遞中􅍽水且試梅花澗底氷三白先春慰客情瑶林照耀夜窓明淺斟低唱癡兒女那得工夫問雪聲多雨詩菜色青肥麥漸黃雨多泥滑野畦荒官田昨夜方車水早起看來又渺茫自嘆休言五十九年非本自無知底用疑已徃方來俱夢境是非元不較毫釐言懐辛苦移家向溧州微官祗為斗升謀尋思終是西湖好日與山僧野老遊奉溪半日到杭城溪外青山喜送迎結屋臨溪差易事買山無計若為情武康湖光門外草連空萬壑千崖紫翠叢縱未便能營隠墅也須先畫作屏風餘杭縣南白嶺溪上野田平黃隴山前竹樹清已許數椽容小住餘英愛我愛餘英徳清縣北故家喬木盡邱墟筍石猶存十數株誰有挾山超海力為分雲片過西湖州南故趙忠靖丞相宅此地曽經李白遊湖山消得好詩留兩橋十里東西市只欠春風一酒樓溧尉唐時本小官詩人爭笑孟酸寒我來莫道儒官冷今古酸寒只一般隔岸修筠拂細瀾風香雨色晝隂寒遥知新買栖霞地坡上應添竹數竿去年新得西湖北山地多有竹馬蹄赤日走紅塵汗濕林宗折角巾輸與夷山班博士深衣脱却作閒人
