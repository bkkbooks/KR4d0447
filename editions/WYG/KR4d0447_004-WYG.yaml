body:
  text: 金淵集卷四元仇逺撰七言律詩元夕放夜繡衣玉節駐江城放得元宵两夜晴陸地金蓮方灧灧一天明月故盈盈邏兵酣卧忘鐘韻逰子歡呼趁鼓聲兒女看燈歸較晚老夫自剔讀書檠憶西坡梅杖藜乆不到西坡苔上梅花積漸多野屋荒涼誰管領酒尊期㑹竟蹉跎韶光二月已强半樂事一生能幾何頼有鄰園春可折洗瓶斜揷在行窩三月二十六日書所聞從来賽社説金淵鼓笛鉦旗隘市㕓地上鬼神行白晝夜中風雨洗青天妖氛旱魃驅無跡和氣歡聲兆有年車馬縱觀兒女事老夫閉户讀韋編寄陳仲麟景仁檇李城邊送客船梅花一别又三年清風朗月思元度駿馬名姬羡謫仙湖海倦遊予白髪園林真樂子青氊楚生卜宅平生志歸日相從學力田予自存博解印歸鄉心日夜相趣古人有名山川處輙忘歸然歸未易忘也夣得一聫續之業風宦海足波瀾常憶西湖南北山熟處肯忘生處樂别時雖易見時難得此二句奉親還舍君先得投檄歸田我未閒漫說桃源人迹絶故園松菊半荒殘送張叔夏㳺金陵肯向金淵暫泊舟相逢衮衮别方休移宫換羽周郎顧詠月吟風太白逰吟風詠月出太白墓銘范傳正作牀上無金猶好客尊中有酒可消愁明朝又作䑓城客細㸔青山似洛州送陳壯甫稅使歸金陵征商㢘幹不言錢異事同寮又一年美譽正香金瀬曲歸心已在冶城邊家傳簮笏青溪譜風送旌旗上水船小草相依行有日莫須摻别重凄然蕭饒州見寄次韻夜来聽雨夣仇溪夣覺招邀客賦詩我自不分官冷熱子須能别酒淳漓江頭風順鱸魚到天外春歸杜宇知十日菊花元不减恰如六月見蒲葵喜晴新嵗連朝喜遇晴宜人宜穀最闗情郊原尚覺春光薄市井先傳米價平趁暖飛蟲生滅易向陽征鴈去留輕北門冷掾無公事間㸔官梅野柳争題趙千里溪山春遊圖一溪流水數家村短櫟長松映蓽門不是花通輞川口祇疑路隔武陵源小橋瘦馬行春色逺浦青山帶雨痕樓觀玲瓏雲縹緲須知畫裏别乾坤寄武康王居正曽向清溪采白蘋江東日暮别經春投金瀬上思歸客浮玉山前憶故人千里雲萍應念我一庭風樹敢忘親挂蓑石暖苔衣厚擬買漁舠作近隣寄梁中砥句曲峯巒翠倚天琳宫瓊舘宴神仙水程纔隔一百里脚債未償三十年幾擬㸔山携酒去相期聽雨對牀眠何當撥遣塵間事一試松根喜客泉寄子埜西牕隠几讀南華頗悟亡羊與戰蝸住乆不知身是客歸休誰謂女無家向陽野竹先抽筍待雪官梅欲試花我愛睡鄉真樂地底須頻喫玉川茶黒兔何年偷䑛元霜鼎變却蟾宫玉雪姿毛頴未封先試墨褐衣乍著便披緇移来暘谷烏相對躍入隂山鬼不知蹤跡分明予甚愛正當秋曉月明時和劉君佐韻寄董静傳髙士雪暗江湖入暮年何人葦外小延縁水痕不動玉平岸春意欲囘花滿天懶出恐消桐屐蠟醉吟忘上苧袍船行當歸學林和靖結屋梅根伴鶴眠驚蟄日雷坤宫半夜一聲雷蟄户花房曉已開野濶風髙吹燭滅電明雨急打牕来頓然草木精神别自是寒暄氣候催惟有石龜并木鴈守株不動任春囘鴈去離羣野鴈在中庭馴養經年羽翼成因為哀鳴殊可念豈知飛去太無情天隂月黒多機穽嵗晚山空少弟兄願爾水田常飽煖春風早問北歸程寄屠存愽三年塵土白鬚眉擬向西湖濯客衣林下杜䳌猶勸去海邊鷗鳥亦知幾及𤓰將得葵邱代存菊須尋栗里歸見說中山屠博士鄉心也趁白雲飛再寄子埜霜力風威各逞强老夫絮被不離牀一貧已幸官將滿百計無如歸最長别後交朋難得信夢中文字不成章從来心似梅花白莫入東風桃李場寄鄧善之㡬年不寄子公書忽向燕南遺鯉魚天逺地遥歸未得男婚女嫁事何如壯逰自致青雲上漫仕誰憐白髪餘西浙林泉俱可隠毋忘舊約共閒居醉聞杜宇㡬日㝠迷醉夢中醒来衣袖裹春風杜䳌未歇鳥聲碎芍藥已開花信空差勝跨驢愁杜老儘教騎馬笑山公卑官安得金貂換尚有杖頭三百銅北村吳園雨中賞牡丹主人留飲不謂村園見此花嬌紅數朶眩晴霞可憐國色天香種竟落田夫野老家畧具杯盤供筍蕨已拚杖屨汚泥沙莫愁乳鹿衘春去自有蓬蒿盡力遮官冷不負平生下澤車宦㳺卜宅亦村墟家貧累重須干禄官冷身閒可讀書髙桞每聞鶯婭姹破籬時度竹蕭疎西南林壑堪娛晚靜㸔飛雲自卷舒喜晴復雨早起方誇甲子晴夜分忽又似盆傾黒雲冉冉連燈暗白浪滔滔與岸平芹未出泥先有燕花都委地尚無鶯東橋沙觜多舟楫直下荆溪不待撑五日湘魄能傳楚澤芳何如倒載醉襄陽夕隂空照栽葵圃宿雨難乾打麥塲龍去涎留丹井濕燕歸泥落墨池香枉將黍粽沉蛟窟移與江村餉水荒雨才放庚申一日晴天明一日雨如傾烏雲覆地隂隂合白浪侵田灧灧平屋漏未乾連礎潤橋低欲壓碍舟行桔橰不是閒家具㑹聽溪邊鵝鸛鳴雨坐梅霖寒似麥秋天風葛凄凄未脱綿金彈落池盧橘熟紅帬委地石榴鮮汨羅遺恨空千載瀬水閒居尚一年蒲酒相邀須徑醉歸尋枕席付髙眠兩年蒲節雨霏微誤我中山采藥期騎馬出門随所寓㸔花酌酒復奚疑量慳未易勝金琖臂弱猶堪繋綵絲追憶侯家陪宴賜素紈紅葛翠交枝與子野過永仙觀循西城以歸邂逅李戒甫夕山西爽詩料滿目子野明發詩来予次韻壊垣荒逕入蒿萊不惹康衢半㸃埃賞靜偏憐雛笋長趂凉自引瘦笻来盃餘潄齒呼新茗石上題詩剥古苔試問依簷雙老檜何如列柏在烏臺一笑相逢李伯時樹隂匝地緑雲低林梢落日猶餘丈天下好山多在西我醉欲歸須客送君裝已趣尚䳌啼明朝定有新詩句且讓溪翁向上題寓舍在青安門外由是出郊不數里羣山獻狀如㳺龍如奔馬如踞虎豹深秀坡陀不一而足似有招引賦詩之意遂約子野再用韻西望寛平倦眼開風收雲翳掃煙埃誰能白日捲簾坐盡㸔青山排闥來合沓斷岡如引蔓盤陀大石不生苔此中林壑多仙跡何必吹簫更楚䑓山列瑶簪束不齊過雲舒卷樹髙低孟郊李白曽行處泰華瑯琊盡向西瘦馬自穿幽徑去老鶯猶戀落花啼豈無厓壁平如削留與詩人醉墨題和仲祥大風韻正憂藴藴與隆隆怪得連朝起大風酷日從今宜斂暑大王自古解稱雄中庭老樹吹將折破屋重茅卷已空可是南溟鵾欲化爰居先避魯門東非雨非靁勢可乘柔枝弱葉力難勝疾於健將追奔馬豪似吟仙賦大鵬柱砥潛移黄螘穴山屏盡啟白雲縢直須少霽飛㢘怒水落圩田穀再登巫雲九峯誰割巫山一片雲峯巒羅列比兒孫嵌空自是天生穴剥蝕無非水渲痕霜削秋清連竹色露腴曉翠及蒲根九峯九鎻參差似永鎮仇溪第一村觀雨雨師殿後疾雷先風捲浮雲似擘綿大㸃成漚添黒潦濃隂匝地暗青天崦中暴長彌漫水圩上平沉沮洳田米直頓増車戽急早推紅日麗金淵宦海黄帽棕鞋隠者便青衫槐笏我家傳一生碌碌空多事六袠駸駸欠二年安樂窩中閒有味温柔鄉裏老無縁浮沉宦海終非願早葺山南屋數椽屠存博教授赴溧水任留飲寓舍只隔山中一日程書船暫泊溧陽城儒冠喜見賢翁季道眼相㸔老弟兄酒量呑江涼更濶蟬聲送客晚争鳴青衫肯為琵琶濕笑向天涯㸔月明寄戚子雲七不能堪一不成閒雲自恨出山輕栁枝駱馬愛心斷蓴莱鱸魚歸興生薄宦棲棲留泮水故人𣺌𣺌隔臺城對牀風雨何時卜共翦青燈話到明送張巨川歸崇徳三載金淵入幙賔轉當繁劇轉精神髙堂多有承顔樂巨室都無切齒人此日吏民争卧轍他時事業繼埋輪語兒溪上滄浪水有約征衣共浣塵二十五日東風少定辛丑夜西風再作東風已掃九衢埃何事飇輪去復囘秋信蘋洲涼漸迫人家蓬户晝難開低田受水祥禾偃亂石飛空巨木摧見說長淮旱無雨蜚蝗㡬欲渡江來五月六日晴芮君節卞西仲諸友来泛蒲和韻端午凄凉雨壓城忽然端六報新晴素衣塵暗行人老縁樹隂濃曙日明倦眼冥冥渾似霧憂心悄悄只如醒枇杷薦酒猶堪醉杏子微酸尚帶生用韻答蕭濟翁想君不欠買山錢要學騎驢孟浩然拂袖徑行輕萬里著書直待後千年林泉短褐凄將老齊館孤燈耿不眠明旦履霜何所向大茅峯頂㸔芝田答徐恕宣城寄别懐古澘然老淚流依稀見月喘吳牛客鄉時序留如燕學舍風波小似舟已恨浮雲無巧夕未知後月可中秋徐卿忽寄新詩札正倚雙溪疊嶂樓江隂何仲禮相訪和答月照空梁㡬夢中翩然環佩下天風十年不到澄江上一櫂能來瀬水東湖海交逰今漸少英豪見識畧相同舊時東野吟詩處何日携壺酹此翁答趙源仲人到中年萬事慵我今况是六旬翁歸心已薄西湖水餘力重修古泮宫官裏簡書尤可畏案頭筆硯豈無功邇來士習殊輕陗願與醇儒振義風交山龍祠禱雨曉入荒蹊陟斷岡多年廟食白龍王要添溪上半篙水不逺山中一瓣香灌木雲昏旌斾出髙田土渴桔橰忙莫疑栖隠無深洞且得随車雨送凉題王師尹宜晚樓詩髙捲書簾雨氣寒螺屏擁髻赴滄灣去天一握屋上屋斜日㡬重山外山地展畫圖増暮景風吹笑語落人間棲鴉已寂歸雲急却怪雲猶未得閒慶孝僧自金陵囘虎林白下長干住㡬年西風入夢即飄然斷橋梅栁全非舊古刹鐘魚大勝前萬里豈宜常作客一簞且可穩栖襌滄江東去風波惡亦欲湖山結數椽如上人歸問浙中友信何年駐錫下山中既見匆匆又欲東燕去鴻來俱是客雲生月落不離空冷泉亭上參吟暢謂文溪飛雪岩前哭老同謂野翁方外友朋詢近况為言已作木鷄翁過介卿溪南隠居卜宅溪南逺市喧一經教子守田園邵平未老𤓰先熟靖節能閒菊自存無白丁來多釀酒放青山入别開門朝衣曽侍天香滿得似荷衣帶露痕悟上人同過史氏隠居經時少暇出郊㳺野曠山遥易見秋祗怪朝來多爽氣似縁我輩是清流荒臺古井平蕪濕斜日西風亂葉愁莫笑田翁無欵待緑菱新摘酒新篘懐盛元仁年過耳順欲何如臂膝酸寒齒髪疎千里驅馳還倦矣數椽卜築合歸與山銜落日誰能繋海漲平田自可鋤寄語虎林諸道伴江湖處處有鱸魚秋日懐吾子行秋髙天闊鴈南翔㳺子愀然思故鄉重陽正當風雨近三徑故應松菊荒酒酣耳熱狂無益江空目短愁何長青山在望有晴日我欲振衣千仭岡七夕河鼓天孫各老成無愁可解任秋聲癡兒笑月羞眉曲稚女穿針鬬眼明夜半且分𤓰果供天中豈識别離情未能免俗消光景醉卧西風夢亦清嵗嵗今宵乞巧樓疎星如奕月如鈎莫將寒信侵房屋肯把閒情問女牛兒笑無書空曬腹婦言有酒可澆愁鵲慵竟失河橋約盡日喳喳古樹頭題羣仙圖世代雖殊道不殊衣冠氣貎列仙儒自憐無計攀靈轡豈意相從入畫圖把袂拍肩歸福地抗塵走俗笑泥塗苔痕還繞榴皮相風雨東林壁半蕪永僊觀賞桂劉君佐黄景巖治酒雙桂崢嶸萬竹間雲枝露粟綴髙寒軒窓日日吹香過冠盖時時載酒㸔月裏曽春金杵臼雨餘亂㸃石棊盤乗槎仙子清如鶴一曲霓裳舞素鸞中秋月出復雨有懐葉子文湯明叔溧濵三度見中秋感歎光隂逐水流常是浮雲妬佳月不容老子醉髙樓鱸香易動張翰興鯨背難追李白㳺遥憶詩人豪氣在湖天空濶放扁舟中秋待月不見期修翫事在杭州月夕那知常滯留縱有候芭常載酒惜無李白共登樓蛩催織婦貧非懶雲掩霜娥老似羞應笑山翁癡守待滿身風露冷貂裘年年待月引壺觴坐對中庭玉一方靜夜忽驚雲作雨索居空使客思鄉荒鷄聲續簷花滴蝴蝶夢囘巖桂香何處髙樓見山濶快予吹笛據胡床賞桂秋來常為桂花忙葉葉西風粟粟涼奎甫宅中開四樹儒珍園後粲孤芳小山招隠人空老朗月當庭影亦香可必明年能賞得一觴且醉此花旁夜聞秋聲西南振響使人驚未必秋聲作此聲萬騎奔馳􅎏皷動千夫翻踏桔橰鳴初疑潮汐還疑雨只在山林不在城人道今年豐稔兆燈前起舞待天明
