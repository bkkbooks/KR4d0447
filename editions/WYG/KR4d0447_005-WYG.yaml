body:
  text: 金淵集卷五元仇逺撰七言律詩送許君起赴餘干教授二首君起生荊溪僑寓錢塘與予丱角交再世契家也予方倚席溧陽君起將振鐸于越同飲江東水分千里明月兄弟真情槩見乎辭當年而父同吾父各罄籯金共教兒可惜兩翁黃壤下不知二子緑衣時着鞭雖已撞樓破列鼎寧無負米思千里送君何以贈長歌泮水蓼莪詩蘭佩蓉裳似倦遊東隅雖失尚堪收君騎潄玉亭前馬我艤投金瀨上舟八品一官俱獨冷兩州千里隔三秋南溟鯤化君能事甘分西湖侣白鷗聞金之一鄧牧心葉去文皆羽化山中獨居學道坐枯禪鹿豕交遊七十年能以幻軀當雨雪終無虚腹坐神仙平生文字知誰愛老死山林絶可憐他日錢塘耆舊傳三髙宜入畫圖傳呉成季尊師與其弟元初㑹于維揚即還金陵成季寄詩因和初平兄弟總神仙化石為羊入上天萬里相期雲上下一江不隔水淵潫對床夜雨吟詩燭歸櫂春風載酒船此是人生真樂事岸花汀草意無邉寄呉元初道録桃花兩度見青春夢裏元都隔幾塵升斗自憐為客久舟車每惜寄書頻君如當日陶宏景我亦他時賀季真東望冶城空戀戀西湖非晚作歸人中秋月出復雨有懐葉子文湯明叔三秋此夕恰平分城市人家半閉門正憶紫雲吹玉笛忽驚皓月照金樽宦情素薄鴻初到詩興方濃雨又昏不是桂花香自慰倚欄無語易銷魂明朝秋風嫋嫋雨瀟瀟兀兀郊居出市遥未欠三盃通大道且欣九日是明朝籬邊舊菊猶堪摘天末新鴻不可招莫恨登髙無脚力強搘湘竹造山椒和西仲秋日聞鶯詩不待風霜剪碧林柳隂忽見一梭金似傳西帝宸逰信空惹東忩夢覺心暫輟笙歌聊試聽既無桃杏莫須吟舊交燕子歸何處好倩賔鴻為嗣音中秋同陳奎甫放舟尋荷訪桂逺相過載雨仙舟泛緑波老眼已經秋若此賞心莫問夜如何金樽檀板逢歡伯玉宇瓊樓鎻素娥爭得西風卷雲幕與君弄月扣舷歌次日歸舟和南仲函山𣺌𣺌㸃青螺古瀬澄澄似絳河塵世不知秋過半水鄉但覺月明多輕舟傲兀魚龍窟夾岸横陳早晚禾一笑躍身煙霧表醉歸何恤夜行訶九月八日持螯趂晴明日擬登髙十里龍山肯憚勞但願有錢堪對菊莫愁無手可持螯蝨官只合辭歸去䑕腹安能賦老饕行見白衣人送酒已􅂸痛飲讀離騷九日諸友屏峯上方登髙得登字天借重陽一日晴因過竹院逺尋僧翠屏晚對無人共畫棟朝飛與客登旋摘菊花浮臘醖待分貝葉讀秋燈餘生有暇須行樂漫向松岡嘆廢陵九日次程公明韻風帘獵獵傍簷斜問酒來投野老家佳節已逢重九日東籬未見兩三花科頭坐石從吹帽拭眼㸔山似隔紗七里岡前歸路闇月懸破鏡憶秦嘉追和陳去非宣和甲辰重九韻世態炎凉不足憂吾生贏得日優游九日忽驚楓葉落百年幾見菊花秋忘形詩酒新豐客滿目溪山古溧州聞道市橋騎馬滑山公歸醉得無愁重陽見菊占冬晴上熟滿城風日釀輕霜昨夜東籬菊盡黃正月自非添一閏此花安得及重陽新鴻逺到愁無信螃蠏中虚怕有芒濁酒醒來聞吉語晴過冬至兆豐穰南仲以潘老句約賦秋聲浩蕩夜凄凉却喜田家熟稻糧千里江湖隨薄宦滿城風雨近重陽菊花漸拆青青蘂桂樹獨飄粟粟香幸是催租人未至尊前聊為足成章十日與侯伯用謝元燾諸友汎菊得頭字西風吹髪冷颼颼頼有多情帽褁頭九日已知成昨夜緑樽聊復集清流山房霜菊偏能耐客路雲萍故自浮欲識嵗寒心皎潔一方月色十分秋和胡定甫安國幾年野水倚扁舟風雪塵埃暗綺裘齊魯青山恒北望江湖白鳥共東流杜陵騎馬尋征路李白題詩遍酒樓文學卑官何足説直須攬轡覔封侯淡泊相逢古溧州世情客况兩悠悠腐儒都不通人事冷椽何曽似宦㳺輕薄成風雖可畏亷勤律已每無愁他時重㑹西湖上把酒聨詩日自由和費廷玉我昔南徐講席分知君肥遯白雲村草深能使芝蘭沒木落方推竹栢尊試問上書投魏闕何如解組守衡門西風吹醒槐安夢斜日悠悠半隱垣笑人狗走鹿斯大卉父子𤓰畦手自耘不願青黃施斷木且將蒼白㸔浮雲山巾聊友華陽鶴野飯時羮古澗芹顯宦何如亷賈好茜巵千石鮆千斤史記貨殖傳和南仲見寄儒冠誤我欲投簮抱膝聊為隴上吟故里未歸先入夢新交雖好少知心清光湛湛溪中月遺跡沉沉瀬底金聞道雪晴豐薺麥行㸔放犢滿桃林我本西湖一散人偶來溪上濯烏巾波光緑映臺城柳山色青回句曲春客舎相親那忍别交情到老願如新江南天氣偏宜暖滿目東風起麴塵送程子方歸蜀薄葺田園溧澤邊鄉心常夢蜀山川梨花知幾逢寒食麥飯誰能灑墓田矍鑠老翁輕客路扶攜稚子上江船東還莫為親朋戀自古雲安有杜鵑風雪飄蕭季子裘大江西泝過荆州渾家無計歸葱肆嵗晚何人付麥舟長子應門寛後慮輕㠶入峽及春遊明年歸趂梅花發共醉䲔僊舊酒樓又送程公禮侍父歸蜀用方萬里韻逺從溧里上潼川渚宿岩棲約半年老子情懐原不淺扁舟風景浩無邊故鄉兵後幾人在明月秋中何處圓母氏懸懸兄弟望順流及早理歸船和友人洮湖韻落日洮湖自放舟詩筒特為寄交遊征夫獨寐難為夜老我多愁不但秋清興何人聨石鼎虛名無夢到金甌黃雞白酒田家樂止有躬耕願未酬呈王元亨僉事無妄三槐鬰鬰德之符喜向金淵識大儒早讀父書明體用夙將使指厲亷隅動搖山嶽威猶在收歛風霜寂似無人道魯公來辨獄行看霖雨澤焦枯時秋旱祈雨白海青素禽敏疾出扶餘六翮雙拳膽氣麄海外天鵝能獨擊雲間俊鶻敢齊驅􅑷身直上非無見戀主歸來不待呼渭水鷹揚亦如此好將粉墨寫成圖秋晚齋居君子堂西屋數間但能容膝敢求安悄無人迹如深井慣聽秋聲是冷官擊馬堦前慵夜秣種蔬墻下助朝餐􅂝來書卷猶堪讀好共青燈了嵗寒校官既與廟官同胡不移家在泮宫暮四朝三嫌有累嵗糜月費愧無功致身館閣須公等曝背庭除任老翁却喜北窓新植竹行㸔玉立向南風乾坤身世一蘧廬南北東西總可居此去三年韓博士向來四壁馬相如移文早遣僕徴米欹枕夜聽兒讀書駕駟乗驄非我事不如醉兀小肩輿竒字生來識不多莫煩載酒日相過廊空儘有葉堪掃門冷渾無雀可羅肯為功名虧道義常因課講費吟哦苔荒茅屋歸期逺細雨簷花且醉歌和姜景星瓦霜磚日合寒晴最愛幽忩逺市聲懶去著書追管葛閑來讀易玩周程勞心未必能齊物寡欲才堪論養生蓍久不神何用卜了知身世遯而亨開遍梅花臘漸殘又傳新厯嵗更端書生愛日惟愁晚稚子敲氷不怕寒酒壓蟻篘醅可撥詩題蠟紙墨難乾宦逰得似家居樂一枕三竿夢寐安和張輔之贈别倚夜雨溪頭泊客船簷花溝溜亦涓涓燈前詩酒留三宿紙上功名付百年寒雁叫霜投木末晴雲扶日出山巔欲歸苦被微官縛不得相從酌冷泉方竹杖勁節稜稜瘦且堅形模界尺出天然山翁甚愛資扶老村衲無知誤削圓偏稱深衣同此矩漫誇長笛大如椽有時閒為吟詩出徙倚中庭月一磚授時厯以丁未為一嵗仇山村叟始生辰六袠平頭又見春檢􅔦今年交一歳乗槎有日到三神文章翰墨聊從好富貴功名莫認真且醉市橋新熟酒紅梅花揷白綸巾一從妻子累心身役役勞勞春復春苦被長貧難擇禄寧甘漸老不如人廣文冷坐非無飯張翰思歸豈為蓴莫問當初弧矢事祗今筆硯亦生塵秋懐和子野霜紈如月勝呉紗彷彿蟾宫路未賖滌暑自宜斟瑞露憑虚誰肯乞飛霞荒城蔓草生螢火古瀨西風起浪花夢裏仇山歸未得竹籬茅屋趁溪斜自笑酸寒老孟郊厭看俗事聚牛毛故鄉甚愛鱸魚美冷掾何嫌馬骨髙少日宦情原淡泊涼風客鬢轉刀騷荷衣槐笏徒拘束不似芒鞋白紵袍陳明逺書塾與蔣平仲張伯成清話霜晴泛渚狎輕鷗人物欣逢古太邱喬木故家猶昨日寒花老圃正清秋尊開北海心先醉燭盡西忩話不休笑我一身閒未得又隨新雨上歸舟送郭君賢使君赴建德任天邊久下紫泥書日日東津望使車最愛小兒騎竹馬也隨迓吏過桐廬良民吐氣心方快宿弊盤根力為鋤祗恐聲名滿朝著春坊賔客又新除先朝日近侍明光步武駸駸政事堂玉宇承恩沾湛露金淵遺愛托甘棠江山此去分風月門戸從來凛雪霜虎兕梟狐宜歛迹丈夫原不畏豪强和呉東升知君豹隱白雲村杖履春風忽過門獨立幸無妻子累老成喜有典型存氷懸古樹花尤雋雪漲寒江水不渾冷落十年燈火讀何時窓下約重温和子野郊居見寄知君標格眼前稀暫别令人入夢思鋏有可彈何必嘆書如肯借本非癡且看平子歸田賦更和淵明述酒詩我勸山中多種漆收功莫恨十年遲論心握手到忘形性癖耽詩各瘦生美酒三升差可戀良田二頃不如耕溪晴正熟眠鷗夢門静那驚吠犬聲泉石煙霞能自樂棄予髙舉得無情歸去來兮意趣長幽居逺隔水雲鄉花粘石几吟詩筆風度溪房煑藥香把酒有時思太白下車何日見元方雲萍暫聚還分散可是先生鐵石腸因子洮湖歸釣魚西湖我亦念吾廬途窮但覺知心少性直由來料事疎愛把琴彈招隠操忍拈筆寫絶交書人間喜怒須臾事暮四朝三任衆狙生日和洪山甫見贈韻嵩雪雲無罅霽無期勾引春光入泮池師道幸為文學掾堯夫喜見太平時典衣沽酒從兒笑閉戸吟詩只子知甚欲相隨强歌舞却憐多病覺衰遲初冬郊行喜聞潁弟與坡兄趁小春晴野外行獨樹荒村生處僻落霞孤鶩去邊明豳風酒食歸田樂韶部塤箎打稻聲從此廣文差飯足素餐秪愧老農耕懶向南園拜石兄肯尋村叟傍溪行黃雲覆畝金穰熟白露横江紅葉明彭澤歸來辭内景康衢撃壤曲中聲一丁不識多牛者應笑書田事筆耕公退曝日公退無營懶讀書出門佳客費招呼閒搔短髪身將老獨坐長簷曰未晡溪女賣魚隨市價村夫騎馬納官租勞生役役知何益却笑今吾即故吾雪晴臘尾春頭半月期寒欺人日雪銷遲纔升晴旭扶桑樹便拂東風細栁枝和氣滿城真可掬豐年撃壤已先知侏儒温飽皇天賜行續中和樂職詩至日用張伯舉韻博士無氊卧冷齋有朋喜自逺方來臘前一信春先到隴首數枝梅已開少忍年荒須辟穀尚遲酒禁且衘盃山中茅屋不歸去空想秋風暗緑苔至日懐羅國賔官冷誰能送酒錢江鄉節物倍蕭然容顔一日老一日人事一年經一年野僕竹輿侵曉出病妻布被抱愁眠甘心歸隠青嵒下閒共殘農理廢田羣隂剥盡一陽回霜日烘晴宿霧開閉戸讀書差自樂載肴問字莫須來榮枯易了觀芸草冷暖相忘付酒盃得似山居酬應少晝長閒坐看寒梅潤州許使君寄餉新釀以流金牋為贄且供詩藳浮玉乗壺香似桂流金方絮滑如苔報投且致相思意酬唱須尋應猝才昔在上都唱和皆不移刻君喜旌幢開使府我貪花竹作春臺明年凖擬游招隠莫放遮山繡幕來冬日小齋即事蘆葦周遭舊楮糊就中穴地砌磚爐儒酸官冷渾相稱草卧氊眠本不拘窓外十分西日照簾間半㸃北風無一瓶雪水煎茶熟清氣真能壓武夫君子堂小集樂嵗欣逢節序新公堂稱兕集嘉賔衣冠尚想江東舊芹藻初回泮水春無事聊為文字飲相看總是老成人且須飽喫圭田飯朝市山林各致身嵗晏遷居借榻青安恰一年年窮何事復謀遷官閒空綰文章印水淺難移書畫船稚子歡呼新入屋老夫嘆息早歸田人生聚散如鳬雁極目江湖萬里天子野雪後寄和却寄廷玉淵明白髪滿頭生肯賦閒情未老成自笑冷官租屋住每因來使出郊迎横經空忝先生號解印仍呼處士名惟有溪干隠君子知予的的願歸耕琴書筆硯伴閒身斗室依然不覺貧野犬自來能吠雪土牛此去且迎春一氊輾轉衾無絮四壁凄凉甑有塵昨夜東風先破凍江梅冷眼笑何人平明跨馬晚方歸偃仰行窩早見幾餘子祗宜牀下卧詩人頓覺眼中稀堂堂白璧埋黃壤冉冉緇塵染素衣得酒便須開口笑雪畦紫芋勝秋肥素琴掛壁已多時政爾難逢鍾子期腹有精神方學道面無塵土始言詩山童隔壁沽村醖田叟登門送墓碑小市饑氓争糴米青州太守可能知至後凭髙欲驗曉雲黃東際紅光見太陽便覺池芹春灔灔俄驚簷竹晝琅琅君師百拜恩難報文史三冬志未償吾道千鈞懸一縷願同繡線日添長陽和昨夜到梅邊喜得春風一信傳同舍團欒齊賀嵗異鄉飄泊又經年夢中歸路忘舟楫客裏生涯倚俸錢紙帳布衾差穩睡不愁獨冷坐無氊霜華如雪著烏巾染鬢粘鬚白未匀人羡久生趨老境日隨長至到新春投金瀨上能容我貢玉堂中自有人溧酒清醇魚菜美不妨頻日宴嘉賔了知五十九年非景薄崦嵫合見幾夜半雖當泉脉動臘前未見雪花飛客程鴻雁駸駸老家養雞豚處處肥千日及瓜今過半未知何日定言歸嵗窮早睡驥尾流光不可追山中小草合知非臘餘四日春先到官滿三年客早歸暗雨隨風茅屋漏荒城爭米燎盆稀明朝又赴公筵賀燈下醒眠懶解衣十一月十六日學宫對酒客况冬晴足自寛招邀春意入毫端浮雲蔽日俄生暝急雨隨風故作寒詩酒相尋忘爾汝古今難必是悲歡茫茫山嶽蘧蘧夢不了梅花冷眼看衰年衰年六十喜平頭微禄虚名老可羞自笑一生同蝜蝂了知萬事等蜉蝣寡懽元亮須歸去老病相如已倦逰只憶西湖春漲緑柳邊雪外艤蘭舟送湯希賢晦庵書院山長文公闕里女星源手澤遺書尚有傳精舍三年常作主脩程千里若登仙青衫槐笏存家譜練帯花屏擁客船故老或詢予出處為言索米向金淵與李孔言上舍談星命辟雍人物已無多奈此江湖落拓何鶴表只宜歸井邑雁程不必度關河詩書志氣存司馬言語功名付祝鮀炙輠談天非我事雨燈聊和醉時歌游士游士登門索裹糧塵埃冉冉化衣裳老夫也自飯不飽童子聊沽酒共嘗彼此身謀寧枉道古今樂事是歸鄉家徒四壁侯千戸夢裏誰能較短長嵗除志喜郊居守嵗若為情一嵗中間百事經建業長男方入拜桐江小女又歸寧蒙頭被暖先髙卧婪尾盃空且獨醒席上梅花開勝雪寒香儘足慰飄零除夕前一日雪江城臘盡漸春來三白呈祥不待催和氣已知隨處滿梅花正用此時開寒香冷艶相吞吐月斧風斤巧剪裁布絮寢衣烘未透爐邊酒熟且􅋦盃呈王直卿御史金淵寳地閱金經朝夕追隨騘馬行激濁楊清真御史即温聽厲老先生衣冠文物今無幾車笠交遊最有情早願明時相司馬他年洛社㑹耆英
