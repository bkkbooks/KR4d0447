body:
  text: 金淵集卷二元仇遠撰七言古詩立春山城厯日到每遲新春殘臘俱不知若非一鞭醒寒夢梅柳爭春無了時牛刀小試東風手目中全牛果何有勾芒舁歸古廟中官吏升堂酌春酒竹素山房小飲南徐唐正方善歌吳伶以長簫和之客以鳯凰臺上憶吹簫分韻豫得臺字少時聞簫白玉臺一曲未終丹鳯來金瀨空明秋水淺妙音久不聞蓬萊吳下老伶燕中回能以北腔歌落梅紅塵筝笛耳一洗便覺箜篌憤抑琵琶哀朱方臞仙古音律宫長羽短隨剪裁小春梅柳參差開肯待羯鼓花奴催我輩鍾情忘爾汝濁醪妙理惟醱醅晚風吹寒夕陽下有酒不飲令人咍今人青眼映山水古人白骨生莓苔不如相聚常銜杯嗚呼五公七相安在哉不如相聚常銜杯北園賞梅梅花先受東君知一晴開遍南北枝吳姬持杯勸客醉已恨賞花三日遲主人惜花不惜酒自摘一枝春在手大開笑口問東風金谷幾人曾白首題王師尹所藏三峽圖上有趙明誠諸公題廬山石橋天下奇奔湍赴壑潛馮夷倚闌俯瞰毛髮竦品題曾讀坡仙詩畫師筆斡造化窟豈必夜半夸娥移蜀天茫茫千萬里倣佛猿聲亦如此何當譜入朱絲絃水底魚龍應洗耳題季路負米圖髙堂有親今老矣孝子晨昏奉甘㫖傷哉貧也敢辭勞百里迢迢親負米後來列鼎坐重裀積粟萬鍾不逮親古言周急不繼富為母請粟非無人題范譓鄉愛山吟境圖前山排闥如虬奔後山擁壁如虎蹲三間茅屋白雲裡一羣野鹿青松根世上好山誰不喜紗帽可能長隱几詩人見石猶下拜况是孤髙有如此終南捷徑從渠行少室素價元非輕呼童下山汲清冷我欲洗耳聽猿聲送存博教授回虎林雙鶴翩翩溧水陽紅塵不染素衣裳一歸華表飲風露一住滄洲謀稻梁湖海波濤多起伏爭食那能效雞鶩戞然長唳楚天寬有日相從逐鴻鵠草蟲圖昨夜南山雷雨霽蟄室初開百蟲起草夭菜秀蒲柳長生意森然隨氣使陰陽變態足纎巧分得餘妍歸畫史野蜂採蜜花房裡官蛙瞪目莎池底紛紛蚱蜢肆跳梁欵欵蜻蜓齊㸃水天牛穴桑奚其天鬼蝶迷花聿如鬼血國三千亦有蚊黍馬十萬寧非蟻蝎虎那能捋虎鬚蝸牛誰堪執牛耳蜣蜋轉丸誠小巧螳螂搏輪非勇士鳴蟬嘶熱蟋蟀吟一片繁聲愁客子春風郊野豈不樂籬落秋風又如此坡仙舊詠只八物若見此圖心更喜我摩老眼為題詩晴日一忩蠅撲紙元夜嘆虎林城中正月半十萬人家燈燦爛溧陽風景方放燈通宵不禁人遊玩大雪深寒萬木僵家家冷坐無薪炭典錢買竹又買燈糠油結凍㸃燈暗豪民張燈喚歌舞鼓笛喧轟夜忘旦忽聞買絲造海船府檄專令豪尸辦倉皇且救火燃眉縱有華燈何暇看老夫掩關擁爐坐一盞青燈置書案良辰樂事悵難并頃刻歡聲作愁嘆蘇公買燈狀陳子題燈詩癡兒騃女知不知月明月暗反覆手且願麥熟休王師雪後祈晴閏正月過二月來溧陽溪頭花亂開濃雲急雨洊雷電不待羯鼓花奴催江南天氣全然别昨夜清寒今日熱東風忽轉西北風吹作霏霏一天雪艷桃穠李睡海棠顔色頓减仍减香燕鶯羞澀未出谷惟見野水生渾黃晝夜交流已登岸邱麥畦蔬根浸爛州官憂水復憂民明日祈晴泰清觀送劉鍊師歸并序鄱陽劉君佐儒家子倜儻有志壯欲囊書叫閽為時用天長翮短未能奮飛乃著道士服薄遊南陬棲九疑之雲釣三湘之月相攸庵止擬他日龜藏計宿留十年然後歸故里再轉溧上師式元宗俯仰方圓不尚衒襮衣冠髙潔炯如玉雪頗厭出塵入坱無意于人間事將俟我乎嶽之麓湘之濱豫喜其勇决髙蹈庸贈以言君佐識定而志不分年盛而材有用與其之南何似且之北九萬雲程勗哉進步君佐名輔漢雲中雞犬隨淮南手攀桂樹歌小山鴻寶祕書在玉枕有高尚者還童顔卯金家世學仙子半生遊山磨屐齒懶耕白雲君號耕雲種瑶草南去持竿釣湘水天風環珮滄江東鄱雲溧雨分鄰封浮邱洪崖未之見擁腫鞅掌常相從拂衣浩然有歸志湘濱已卜誅茅地寸田尺宅可治生騎鶴纒腰非易事不如且向金蓮遊濯足萬里黃河流上界神仙足官府山中宰相輕公侯人生得意無南北蠅利蝸名等雞肋道人一粲據槁梧世間萬事槐安國寒食遊陳園梨花李花白鬭白桃花杏花紅映紅疏籬曲徑錦步障間以巨竹青玲瓏獨木為橋人不渡柴扉欲鎖春風住豈知野禽浪蜂蝶時復銜花過墻去春波漲緑春日晴柳下扣門嵇喜迎池邊亭上少盤礴坐牀指㸃呼麴生冷官况逢寒食節客味凄凉那可說殘杯冷炙何處無樂意生香聊自悅清明天氣晴更佳山林川谷多鶯花後庭遺曲少人唱踏歌椎鼓爭喧譁笑折一枝花入手樹猶如此人能久六朝舊事付東流醉翁之意不在酒月琴吟贈程禹仲我月太古色我琴太古音色見音聲求焉能知我心月到茅亭夜亭午據梧坐看胎仙舞本無圓缺無虧盈心迹雙清遊太古笑渠空向廣寒遊記得霓裳羽衣譜應平叔送牡丹詩草元亭前老侯芭贈我鞓紅三朵花一春風雨傷麥麻天香何事來山家且勸花王一杯酒更祝花王千萬夀洛陽名苑今在否未必開花大如斗有花可賞不負春紅紫轉眼俱成塵酣歌誰識李翰林酒樓柳絮愁殺人德興葉志道字士心葬母于銀山丹井之上作丹泉吟葛公學仙丹有泉葉公藏母丹泉邊泉流㶁㶁亂石底丹光炯炯長松巔陟彼屺兮瞻望母麻衣土枕常廬墓難將寸草報春暉秪覺焄蒿泣秋露男兒眼中非無淚有淚徹泉無厚地泉聲如咽淚如丹何待泄融歌大隧幽花淡月耿墓門不招仙魄招母魂子規一聲蒼石裂白雪渺渺山昏昏題沈子和德冲畫龍紅霞飛盡元雲同深山大澤生春風震雷一聲蟄户啓老龍夭矯生蒼穹憶曾艤舟垂虹外舟子傳呼黑龍掛須臾急雨暗吳淞昔見真龍今見畫江南久旱草木空湖水陡落如秋冬蒼生望霓心顒顒阿香喚起隆中龍送春寄友老翁欲作送春詩借問春去將何之連朝醉不省人事昨夜春歸更不知客裝欲趁春歸去家在西湖緑隂處青青竹筍白白魚也勝客中常茹素杜鵑吻血啼未乾髮白易黑留春難冶城翁定有新語楝花風急生餘寒贈溧水楊老浙間筆工麻粟多精藝惟數馮應科吳升姚愷已難得陸震楊鼎肩相摩我遊金淵飯不足破硯生苔塵滿目毛錐自笑不中書白髮紛紛老而秃中山博士屠存博子墨卿貽書薦至楊茂林里儒大半習刀筆耳聞竽瑟誰知音善刀而藏歸勿出博士校書行有日定當致汝數百枚東坡有云北方無此筆贈筆工沈秀榮吾家歙石鋒芒出不但挫墨亦挫筆老懶作事苦不多一筆才供兩三日近知沈子藝希有洗擇圓齊易入手不論兔頴與羊毛染墨試之能耐久禮樂三千成昨夢秃筆何止十八甕長槍大劔正當時毛錐子者直安用金淵萬家籍百儒學書用筆人豈無管城欲重連城價請擕椽筆遊江湖醉醒吟衆人皆醉我獨醒衆人皆醒我獨醉先生何苦與世違醒醉之中有深意或云酒是腐腸藥沉湎淫泆無不至或云酒是忘憂物醉鄉别有一天地左拍五柳先生肩右把三閭大夫臂醉時元自惺惺著醒來亦自齁齁睡獨醒獨醉豈多得衆醉衆醒堪一喟醉者自醉醒自醒卿法吾情各行志溧江美酒差可戀說醉論醒姑且置公不見昔人有云且食蛤蜊那知許事謝秋澗沈君瑞為豫寫真山村道人今老矣徒有虛名落人耳夢中誰記版築夫畫像雖多終不似偶來招隱九鎖山隱侯試筆開生顔鬚眉口鼻宛相肖只今置之泉石間聞君尤工畫山水萬壑千林生筆底可能更掃隱居圖布襪青鞋侣樵子夏雨嘆六月溧陽三日雨山田喜足低田苦學中亦有北鈐墟低處水深三尺許秧苖浸倒根已浮再種何由能入土老夫寓居西郭外厭聽村村踏車鼓唇焦面黑嗟農夫此生悔不業樵漁有山可采水可釣免得曉夜憂耕鋤去年一熟才了逋今年再熟力始舒豈期不待稻花白併隨荇藻歸江湖溧陽近與丹陽接不雨由來三數月河流淺澀田乾枯練湖放水通舟楫人間既是寒暑同天上何為雨暘别願移此雨慰彼心還我朱明作炎熱州㕔設醮即事去歲今朝六月六暮雨傾盆風拔木今歲公宇醮祈晴晝日當空生暑溽羽士宣詞官吏拜燈燭熒煌香馥郁須臾黑雲西北來如蓋如輪覆㕔屋電驅霹靂掣金蛇簷溜奔騰瀉銀竹幃屏掀開幡幢飛卷盡香灰吹滅燭天威震怒莫敢喘謝罪怔營虞䙝瀆少焉雨止凉颼颼天氣如秋失中伏四郊大田多黍苖一片瀟湘接湖洑村夫中庭涕泗下歸聞野老吞聲哭只恐戢戢生魚頭何止廣文飯不足天心仁愛子勿憂府公移文行振粟古言大雨不為災雲雨須臾手翻覆荆溪橋荆溪滔滔向東注長橋束之川后怒英風颯爽白晝昏此是孝侯斬蛟處客船逆上帆下檣何如懸水泝呂梁百篙攢石雙櫓健進退咫尺千丈强我來偶值凍雨作且近孝侯祠下泊平生忠孝侯所知世途更似風波惡七月丙辰迎土山龍王入郛秋陽皓皓人皆苦安得清風掃殘暑河流欲斷泉脉乾一望髙田變焦土洮湖白龍迎入城行道燒香入亭午青天已響阿香車平地未見商羊舞昔時曾說雨催詩今朝還要詩催雨願龍速降神力㴻甘霖萬落千村熟禾黍諭馬山公有馬不肯騎東西徒步足力疲吾兒有力駕馭之兀兀馳驟那敢嘶爾馬亦似欺我老乘駟乘驄非不好老翁自愛下澤車放爾春郊飽青草秋雨杜陵昔日歌秋風卷去屋上茅三重村翁今夜嘆秋雨衝倒簷前墻數堵瓦傾棟撓直見天寒侵素被不得眠相如家徒四壁立我比相如尤可憐錢唐近報融風起瓦礫塵埃半城市霜餐露宿人遑遑衣食難謀况居止呼童向曉收篁蘆補籬織箔聊枝梧雨飄有限行且止秋陽餘暖留桑榆嗚呼居得一日且一日丈夫安能事一室寄南仲坡翁昔年五十二翰林侍讀為學士溪翁年德與坡同官職胡為未相似我道閒人勝貴人儻來軒冕溪雲比翁今田園瀨水上頗勝求田陽羡里翁今有弟夜雨對牀樂頗勝卯君懷逺驛中有感秋風起有時筆牀茶竈泛洮湖栁外梅邊從徙倚詩筒經卷靜工夫光景流連一彈指不論衆醉與獨醒不問此非并彼是客來不必及時事有酒且斟無即止從今笑傲五百年銅狄銅駝皆敝屣小山老桂敷秋香下弦月照西風凉今夕如此好風月胡不招邀坡翁霞佩同頡頏翁今放舟何所適新詩漫表長相憶舟中不可久留兮盍早歸來共賦碧雲餐白石時生日出避客留飲篠塢承隱君山莊夾山崢嶸相對起貫以盈盈衣帶水白雲深塢碧篠合華屋盤紆蒼樹裡二三隱者古衣冠魚酒招邀極歡喜維舟岸曲信宿留惜别依依行復止東南風順帆上桅一轉瞬間行十里人生交契無故新他日停雲從此始菊楚澤秋髙衆芳歇眼中見此霜下傑南窗粲粲八九株淡白深黃顔色别自笑背時難獨立恰是重陽過一月丁寧女子莫摘殘留伴梅花傲氷雪和李致逺秀才君深平生志氣隘九州直欲濯足萬里流詎期功名坐蹭蹬不意歲月成繆悠防間擬鑄鐵門限牽挽忽作金瀨遊栖巢未穩烏鵲月歸夢已熟鱸魚秋連宵風雨正僵卧何時臨壑容竒搜可人喜接一日雅此地判作三年留說詩解字屢握手感時懷古頻搔頭吳郡才子止邱沈梁園舊賦餘枚鄒天上仙應無懵者眼中客復有此不家聲久識南北阮筆力眇視大小歐我方得友頗慶快子亦固窮忘怨尤蹄涔乃使鯨鯢伏拳石難與嵩岱侔紛紛嗜好異齊瑟磊磊肝膽呈吳鈎有才未遇政何損知爾不薦終當羞往事欲談遽易了濁酒既傾焉得愁平乘樓上王夷甫下澤車中馬少游須笑即今仕宦人嚅唲言貌如伶優若為田園足以活與爾水火無相求一瓢陋巷誓不出孤雲野鶴心自由斯文將興天未喪游子纍纍徒隱憂九日客中菊糕萸蟹年年有未信今年此地無一瓻新釀正三白幸是杖頭錢可沽客况凄凉宦情薄釜欲生魚門羅雀未能早賦歸田園白酒黃雞差自樂户曹司馬村校書相呼徑詣黃公壚滿頭插菊把茱萸强歌强舞醉相扶何必更畫豳風圖夀星相西方長庚今我是東郡短人豈兄弟修眉班首頂如剃蹡蹡衣裳猶楚製翩然來遊太平世市上小兒驚且睨身外不須童鶴贅一粲人間八千歲曉雪昏昏慘慘窗映月索索颯颯風吹葉青童開門忽驚笑昨夜庭心一寸雪東方日出雪漸融簷花滴滴皆春風山村布被正酣卧愁殺門前賣炭翁雨雪閉關子野公明仲祥載酒逺慰晚以詩見寄和答溧陽三日雪平地城市十家九家閉官舍無氊冷徹骨省事正宜尋老計小人自不知紀年我久忘吾豈忘世出門無礙將何之已拚食貧了三歲深雪沒履寒徹綿誰子扣門四詩仙袖中黃絹虀臼辭塗抹既醉鳬鷖篇我非不納學泄柳政爾欲眠如孝先忘形爾汝子勿怪坦率從來六十年
